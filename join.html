<style>
/* ── CSS tokens ── */
:root{
  --bg:#f8f9fc; --bg2:#f0f2f7; --bg3:#e6e9f0;
  --card:#ffffff;
  --border:rgba(0,0,0,0.07); --border2:rgba(0,0,0,0.13);
  --text:#0d1017; --text2:#4a5068; --text3:#9099b0;
  --gold:#c97e08; --gold2:#a86505; --gold3:#e09010;
  --gold-dim:rgba(201,126,8,0.09); --gold-glo:rgba(201,126,8,0.30);
  --green:#0fa876; --green-dim:rgba(15,168,118,0.10);
  --red:#d94f3b;  --red-dim:rgba(217,79,59,0.09);
  --fd:'Cormorant Garamond',Georgia,serif;
  --fb:'DM Sans',system-ui,sans-serif;
  --fm:'DM Mono',monospace;
  --r:10px; --r2:14px;
}
[data-theme="dark"]{
  --bg:#07090f; --bg2:#0d1018; --bg3:#141824;
  --card:#111420;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#e8ecf4; --text2:#8892aa; --text3:#4a5270;
  --gold:#f0b429; --gold2:#d49a10; --gold3:#f5c842;
  --gold-dim:rgba(240,180,41,0.10); --gold-glo:rgba(240,180,41,0.30);
  --green:#2dd4a0; --green-dim:rgba(45,212,160,0.10);
  --red:#f75f4f;  --red-dim:rgba(247,95,79,0.10);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;}
body{font-family:var(--fb);background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
a{color:inherit;text-decoration:none;}
button{cursor:pointer;border:none;font-family:inherit;}

/* ── background glow ── */
.join-bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 55% 55% at 20% 30%,rgba(201,126,8,.07),transparent),
    radial-gradient(ellipse 40% 40% at 80% 70%,rgba(45,110,219,.04),transparent);}
[data-theme="dark"] .join-bg{
  background:
    radial-gradient(ellipse 55% 55% at 20% 30%,rgba(240,180,41,.07),transparent),
    radial-gradient(ellipse 40% 40% at 80% 70%,rgba(79,142,247,.04),transparent);}

/* ── minimal nav ── */
.top-nav{
  position:fixed;top:0;left:0;right:0;height:60px;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;
  background:rgba(248,249,252,0.88);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);}
[data-theme="dark"] .top-nav{background:rgba(7,9,15,0.90);}
.nav-logo{font-family:var(--fd);font-weight:900;font-size:17px;
  letter-spacing:-.02em;color:var(--text);text-decoration:none;}
.nav-logo span{color:var(--gold);}
.nav-right{display:flex;align-items:center;gap:10px;}
.btn-theme{width:30px;height:30px;border-radius:7px;
  border:1px solid var(--border2);background:none;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--text2);transition:all .2s;}
.btn-theme:hover{border-color:var(--gold);color:var(--gold);}
.nav-signin{font-size:13px;color:var(--text2);padding:6px 14px;
  border-radius:7px;border:1px solid var(--border2);transition:all .2s;}
.nav-signin:hover{border-color:var(--gold);color:var(--gold);}

/* ── page ── */
.page{position:relative;z-index:1;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:80px 20px 60px;}

/* ── card ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:44px 40px;width:100%;max-width:460px;
  box-shadow:0 20px 60px rgba(0,0,0,.07);
  animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both;}
[data-theme="dark"] .card{box-shadow:0 20px 60px rgba(0,0,0,.5);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}

/* card header */
.card-logo{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:24px;}
.card-logo-mark{width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fm);font-size:11px;font-weight:700;color:#fff;letter-spacing:.05em;}
[data-theme="dark"] .card-logo-mark{color:#07090f;}
.card-logo-name{font-family:var(--fd);font-weight:900;font-size:16px;letter-spacing:-.03em;}
.card h1{font-family:var(--fd);font-size:24px;font-weight:900;
  letter-spacing:-.03em;text-align:center;margin-bottom:6px;}
.card-sub{font-size:14px;color:var(--text2);text-align:center;margin-bottom:28px;line-height:1.6;}

/* alert */
.alert{font-size:13px;padding:11px 14px;border-radius:9px;margin-bottom:16px;
  display:none;line-height:1.55;}
.alert.show{display:block;}
.alert.error{background:var(--red-dim);color:var(--red);border:1px solid rgba(217,79,59,.15);}
[data-theme="dark"] .alert.error{color:#f75f4f;}
.alert.success{background:var(--green-dim);color:var(--green);border:1px solid rgba(15,168,118,.2);}

/* fields */
.field{margin-bottom:14px;}
.field-label{display:block;font-size:11px;font-weight:600;color:var(--text2);
  margin-bottom:6px;font-family:var(--fm);letter-spacing:.05em;text-transform:uppercase;}
.form-input{width:100%;padding:11px 14px;border-radius:9px;
  border:1px solid var(--border2);background:var(--bg);
  color:var(--text);font-size:13px;font-family:var(--fb);
  outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--gold);}
.form-input::placeholder{color:var(--text3);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* password eye */
.pass-wrap{position:relative;}
.pass-wrap .form-input{padding-right:42px;}
.pass-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;padding:4px;
  color:var(--text3);font-size:16px;line-height:1;transition:color .2s;
  display:flex;align-items:center;justify-content:center;}
.pass-eye:hover{color:var(--text2);}

/* password strength */
.strength-bar{display:flex;gap:4px;margin-top:7px;}
.strength-seg{height:3px;flex:1;border-radius:2px;background:var(--border2);transition:background .3s;}
.strength-seg.weak{background:#d94f3b;}
.strength-seg.fair{background:#f0b429;}
.strength-seg.good{background:#2d6edb;}
.strength-seg.strong{background:#0fa876;}
.strength-label{font-size:10px;color:var(--text3);margin-top:4px;font-family:var(--fm);
  font-weight:700;letter-spacing:.05em;transition:color .3s;}
.strength-label.weak{color:#d94f3b;}
.strength-label.fair{color:#f0b429;}
.strength-label.good{color:#2d6edb;}
.strength-label.strong{color:#0fa876;}

/* submit */
.btn-submit{width:100%;padding:13px;border-radius:10px;
  font-family:var(--fd);font-size:15px;font-weight:900;
  letter-spacing:-.01em;cursor:pointer;border:none;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#fff;transition:all .2s;margin-top:6px;
  display:flex;align-items:center;justify-content:center;gap:8px;}
[data-theme="dark"] .btn-submit{color:#07090f;}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 28px var(--gold-glo);}
.btn-submit:disabled{opacity:.55;transform:none;cursor:not-allowed;box-shadow:none;}

/* dots loader */
.dots{display:inline-flex;gap:4px;align-items:center;margin-left:4px;}
.dot{width:4px;height:4px;border-radius:50%;background:currentColor;
  opacity:.4;animation:dp 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.3;}40%{opacity:1;}}

/* divider + footer */
.divider{height:1px;background:var(--border);margin:20px 0;}
.form-footer{font-size:13px;color:var(--text2);text-align:center;}
.form-footer a{color:var(--gold);font-weight:700;}
.form-footer a:hover{text-decoration:underline;}

/* trust strip */
.trust{display:flex;align-items:center;justify-content:center;gap:16px;
  margin-top:20px;padding-top:18px;border-top:1px solid var(--border);}
.trust-item{display:flex;align-items:center;gap:5px;
  font-family:var(--fm);font-size:10px;color:var(--text3);letter-spacing:.04em;}

/* success card */
.success-card{display:none;text-align:center;}
.success-card.visible{display:block;animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both;}
.success-ico{font-size:44px;margin-bottom:14px;}
.success-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;
  border-radius:100px;background:var(--green-dim);border:1px solid rgba(15,168,118,.2);
  color:var(--green);font-family:var(--fm);font-size:10px;font-weight:700;
  letter-spacing:.05em;margin-bottom:14px;}
.success-title{font-family:var(--fd);font-size:22px;font-weight:900;margin-bottom:8px;}
.success-body{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:24px;}
.btn-dash{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;
  border-radius:10px;font-family:var(--fd);font-size:15px;font-weight:900;
  cursor:pointer;border:none;transition:all .2s;
  background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;}
[data-theme="dark"] .btn-dash{color:#07090f;}
.btn-dash:hover{transform:translateY(-1px);box-shadow:0 8px 24px var(--gold-glo);}

@media(max-width:480px){
  .card{padding:32px 22px;border-radius:16px;}
  .form-grid{grid-template-columns:1fr;}
  .top-nav{padding:0 16px;}
  .trust{flex-wrap:wrap;gap:10px;}
}
</style>
</head>
<body>

<div class="join-bg"></div>

<!-- Minimal nav -->
<nav class="top-nav">
  <a href="index.html" class="nav-logo">Impact<span>Grid</span></a>
  <div class="nav-right">
    <button class="btn-theme" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    <a href="login.html" class="nav-signin">Sign in</a>
  </div>
</nav>

<div class="page">
  <div class="card">

    <!-- logo -->
    <div class="card-logo">
      <div class="card-logo-mark">IG</div>
      <span class="card-logo-name">ImpactGrid</span>
    </div>

    <h1>Create Account</h1>
    <p class="card-sub">Free forever. No card required.</p>

    <!-- FORM -->
    <div id="signup-form">
      <div class="alert" id="alert"></div>

      <div class="form-grid">
        <div class="field">
          <label class="field-label">First Name *</label>
          <input id="fname" class="form-input" type="text" placeholder="Sarah"
            onkeydown="if(event.key==='Enter')joinCreator()"/>
        </div>
        <div class="field">
          <label class="field-label">Last Name *</label>
          <input id="lname" class="form-input" type="text" placeholder="Johnson"
            onkeydown="if(event.key==='Enter')joinCreator()"/>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Email Address *</label>
        <input id="email" class="form-input" type="email" placeholder="you@email.com"
          onkeydown="if(event.key==='Enter')joinCreator()"/>
      </div>

      <div class="field">
        <label class="field-label">Password *</label>
        <div class="pass-wrap">
          <input id="pass" class="form-input" type="password" placeholder="Min. 8 characters"
            oninput="checkStrength(this)"
            onkeydown="if(event.key==='Enter')joinCreator()"/>
          <button type="button" class="pass-eye" onclick="togglePass('pass',this)" aria-label="Show password">👁</button>
        </div>
        <div class="strength-bar">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
        <div class="strength-label" id="strength-label"></div>
      </div>

      <div class="field">
        <label class="field-label">Confirm Password *</label>
        <div class="pass-wrap">
          <input id="pass2" class="form-input" type="password" placeholder="Repeat your password"
            onkeydown="if(event.key==='Enter')joinCreator()"/>
          <button type="button" class="pass-eye" onclick="togglePass('pass2',this)" aria-label="Show password">👁</button>
        </div>
      </div>

      <button class="btn-submit" id="submit-btn" onclick="joinCreator()">Create Account →</button>

      <div class="divider"></div>
      <div class="form-footer">Already have an account? <a href="login.html">Sign in</a></div>

      <div class="trust">
        <div class="trust-item">🔒 Secure</div>
        <div class="trust-item">✦ No card required</div>
        <div class="trust-item">⚡ Instant access</div>

    <!-- SUCCESS STATE -->

      <div class="success-body" id="success-body"></div>
      <a href="dashboard.html" class="btn-dash">Go to Dashboard →</a>
    </div>

  </div>
</div>

<script>
/* ── Theme ── */
(function(){
  var saved = localStorage.getItem('ig_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  var btn = document.getElementById('themeBtn');
  if(btn) btn.textContent = saved === 'dark' ? '☀️' : '🌙';
})();

function toggleTheme(){
  var cur  = document.documentElement.getAttribute('data-theme') || 'light';
  var next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('ig_theme', next);
  var btn = document.getElementById('themeBtn');
  if(btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
}

/* ── Password eye ── */
function togglePass(inputId, btn) {
  var inp = document.getElementById(inputId);
  var hidden = inp.type === 'password';
  inp.type = hidden ? 'text' : 'password';
  btn.textContent = hidden ? '🙈' : '👁';
}

/* ── Password strength ── */
function checkStrength(input) {
  var v = input.value;
  var score = 0;
  if (v.length >= 8)  score++;
  if (v.length >= 12) score++;
  if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  var level = v.length === 0 ? 0 : score <= 1 ? 1 : score === 2 ? 2 : score <= 4 ? 3 : 4;
  var labels  = ['','Weak','Fair','Good','Strong'];
  var classes = ['','weak','fair','good','strong'];
  for (var i = 1; i <= 4; i++) {
    var seg = document.getElementById('s' + i);
    seg.className = 'strength-seg' + (i <= level ? ' ' + classes[level] : '');
  }
  var lbl = document.getElementById('strength-label');
  lbl.textContent = v.length > 0 ? labels[level] : '';
  lbl.className = 'strength-label' + (v.length > 0 ? ' ' + classes[level] : '');
}

/* ── Alert helpers ── */
function showAlert(msg, type) {
  var el = document.getElementById('alert');
  el.innerHTML = msg;
  el.className = 'alert ' + type + ' show';
}
function hideAlert() {
  document.getElementById('alert').className = 'alert';
}

/* ── Sign up ── */
async function joinCreator() {
  hideAlert();
  var fname = document.getElementById('fname').value.trim();
  var lname = document.getElementById('lname').value.trim();
  var email = document.getElementById('email').value.trim();
  var pass  = document.getElementById('pass').value;
  var pass2 = document.getElementById('pass2').value;
  var btn   = document.getElementById('submit-btn');

  if (!fname || !lname)  { showAlert('Please enter your first and last name.', 'error'); return; }
  if (!email)            { showAlert('Please enter your email address.', 'error'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showAlert('Please enter a valid email address.', 'error'); return; }
  if (!pass || pass.length < 8) { showAlert('Password must be at least 8 characters.', 'error'); return; }
  if (pass !== pass2)    { showAlert('Passwords do not match.', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = 'Creating account… <span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';

  try {
    var c = getSupabase();
    if (!c) throw new Error('Auth service not ready — please refresh and try again.');

    var fullName = fname + ' ' + lname;
    var res = await c.auth.signUp({
      email: email,
      password: pass,
      options: { data: { full_name: fullName, role: 'photographer' } }
    });
    if (res.error) throw res.error;

    /* Upsert profile only if session is immediately available */
    var userId = res.data.user ? res.data.user.id : null;
    if (userId && res.data.session) {
      try {
        await c.from('profiles').upsert({
          user_id:    userId,
          full_name:  fullName,
          email:      email,
          role:       'photographer',
          updated_at: new Date().toISOString()
        }, { onConflict: 'user_id' });
      } catch(e) { /* Non-fatal — profile created on first login */ }
    }

    /* Show success */
    document.getElementById('signup-form').style.display = 'none';
    document.getElementById('success-title').textContent = 'Welcome, ' + fname + '!';
    document.getElementById('success-body').textContent  = res.data.session
      ? 'Your account is ready. Head to your dashboard to get started.'
      : 'Almost there — check your email and click the confirmation link to activate your account.';
    document.getElementById('success-card').classList.add('visible');

  } catch(err) {
    var msg = err.message || 'Something went wrong. Please try again.';
    if (/already registered|already been registered/i.test(msg)) {
      msg = 'This email is already registered. <a href="login.html">Sign in instead?</a>';
    }
    showAlert(msg, 'error');
    btn.disabled = false;
    btn.innerHTML = 'Create Account →';
  }
}

/* ── Redirect if already logged in ── */
(function(){
  var c = getSupabase();
  if (!c) return;
  c.auth.getSession().then(function(r){
    if (r.data && r.data.session) window.location.href = 'dashboard.html';
  }).catch(function(){});
})();
</script>
