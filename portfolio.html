<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Impact Grid Events</title>
  <meta name="description" content="Our portfolio of event photography and content creation. Impact Grid Events — Manchester." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KVJC5DE2WT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-KVJC5DE2WT');
  </script>

  <style>
    :root { --pf: 'Fraunces', Georgia, serif; }

    /* ═══════════════════════════════════════
       PAGE WRAPPER
    ═══════════════════════════════════════ */
    .pf-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px 100px;
    }

    .pf-label {
      font-family: var(--fm);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
    }
    .pf-title {
      font-family: var(--pf);
      font-size: clamp(38px, 5.5vw, 72px);
      font-weight: 300;
      line-height: 1.04;
      letter-spacing: -0.03em;
      color: var(--text);
      text-align: center;
      margin-bottom: 64px;
    }
    .pf-title em { font-style: italic; color: var(--gold); }

    /* ═══════════════════════════════════════
       BOOK SCENE
    ═══════════════════════════════════════ */
    .book-scene {
      perspective: 2400px;
      width: min(1000px, 96vw);
      margin: 0 auto;
      position: relative;
    }

    /* Glow under the book */
    .book-scene::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 55%;
      height: 50px;
      background: radial-gradient(ellipse, var(--gold-glo) 0%, transparent 70%);
      filter: blur(14px);
      pointer-events: none;
    }

    .book-root {
      position: relative;
      width: 100%;
      /* 2:3 aspect per page, two pages side by side */
      aspect-ratio: 2 / 0.72;
      transform-style: preserve-3d;
    }

    /* ── FIXED LEFT & RIGHT HALVES ── */
    /* These are the "resting" pages always visible */
    .book-half {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      overflow: hidden;
    }
    .book-half-left {
      left: 0;
      border-radius: 6px 0 0 6px;
      box-shadow: -6px 8px 40px rgba(0,0,0,0.45), -2px 0 8px rgba(0,0,0,0.2);
      background: #1a1410;
    }
    .book-half-right {
      right: 0;
      border-radius: 0 6px 6px 0;
      box-shadow: 6px 8px 40px rgba(0,0,0,0.45), 2px 0 8px rgba(0,0,0,0.2);
      background: #1a1410;
    }
    .book-half img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Page number badges */
    .book-pg-num {
      position: absolute;
      bottom: 14px;
      font-family: var(--fm);
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      background: rgba(0,0,0,0.35);
      padding: 3px 10px;
      border-radius: 100px;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }
    .book-half-left .book-pg-num  { left: 18px; }
    .book-half-right .book-pg-num { right: 18px; }

    /* Event label overlay bottom-left / bottom-right */
    .book-ev-ov {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.68) 0%, transparent 50%);
      pointer-events: none;
    }
    .book-ev-info {
      position: absolute;
      bottom: 36px;
      left: 24px;
      pointer-events: none;
    }
    .book-ev-info.right { left: auto; right: 24px; text-align: right; }
    .book-ev-tag {
      font-family: var(--fm);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .book-ev-name {
      font-family: var(--pf);
      font-size: clamp(13px, 1.6vw, 20px);
      font-weight: 300;
      color: #fff;
      line-height: 1.2;
    }

    /* ── SPINE ── */
    .book-spine {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 100%;
      z-index: 50;
      pointer-events: none;
      /* dark groove */
      background: linear-gradient(to right,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.15) 30%,
        rgba(255,255,255,0.04) 50%,
        rgba(0,0,0,0.15) 70%,
        rgba(0,0,0,0.55) 100%
      );
    }

    /* ── FLIPPING PAGE ── */
    /* This sits on top and animates */
    .flip-leaf {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      transform-style: preserve-3d;
      transform-origin: left center;
      transition: transform 0.75s cubic-bezier(0.645, 0.045, 0.355, 1.000);
      z-index: 30;
      pointer-events: none;
    }
    .flip-leaf.from-right {
      left: 50%;
      transform-origin: left center;
    }
    .flip-leaf.flipping-fwd {
      animation: flipFwd 0.75s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards;
    }
    .flip-leaf.flipping-back {
      animation: flipBack 0.75s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards;
    }

    @keyframes flipFwd {
      0%   { transform: rotateY(0deg); left: 50%; transform-origin: left center; }
      100% { transform: rotateY(-180deg); left: 50%; transform-origin: left center; }
    }
    @keyframes flipBack {
      0%   { transform: rotateY(-180deg); left: 0%; transform-origin: right center; }
      100% { transform: rotateY(0deg); left: 0%; transform-origin: right center; }
    }

    .flip-leaf-face, .flip-leaf-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }
    .flip-leaf-face {
      border-radius: 0 4px 4px 0;
      box-shadow: 6px 0 20px rgba(0,0,0,0.3);
    }
    .flip-leaf-back {
      transform: rotateY(180deg);
      border-radius: 6px 0 0 6px;
      box-shadow: -6px 0 20px rgba(0,0,0,0.3);
    }
    .flip-leaf-face img, .flip-leaf-back img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    /* page-turn shadow / curl shading */
    .flip-leaf-face::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to left, rgba(0,0,0,0.28) 0%, transparent 35%);
      pointer-events: none;
    }
    .flip-leaf-back::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(0,0,0,0.28) 0%, transparent 35%);
      pointer-events: none;
    }

    /* ── CLICK ZONES ── */
    .book-click-left,
    .book-click-right {
      position: absolute;
      top: 0; width: 50%; height: 100%;
      z-index: 40;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .book-click-left  { left: 0; }
    .book-click-right { right: 0; }

    .book-arrow {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: rgba(255,255,255,0.7);
      transition: all 0.2s;
      opacity: 0;
    }
    .book-click-left:hover  .book-arrow,
    .book-click-right:hover .book-arrow { opacity: 1; background: rgba(255,255,255,0.16); }
    .book-click-left.disabled,
    .book-click-right.disabled { cursor: default; }
    .book-click-left.disabled  .book-arrow,
    .book-click-right.disabled .book-arrow { display: none; }

    /* ── BOOK STATUS BAR ── */
    .book-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      margin-top: 36px;
    }
    .book-status-label {
      font-family: var(--pf);
      font-size: 15px;
      font-weight: 300;
      font-style: italic;
      color: var(--text2);
      min-width: 160px;
      text-align: center;
    }
    .book-status-dots {
      display: flex; gap: 7px; align-items: center;
    }
    .book-status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--border2);
      border: none; cursor: pointer; padding: 0;
      transition: all 0.25s;
    }
    .book-status-dot.active {
      background: var(--gold);
      transform: scale(1.45);
    }

    /* ── HINT TEXT ── */
    .book-hint {
      margin-top: 20px;
      font-family: var(--fm);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
    }

    /* ── LOADING / EMPTY ── */
    .book-loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--card);
      border-radius: 6px;
      font-family: var(--fm);
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── EVENT PICKER GRID ── */
    .pf-events-label {
      font-family: var(--fm);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 14px;
      text-align: center;
    }
    .pf-events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
      width: min(1000px, 96vw);
      margin: 0 auto 64px;
    }
    .pf-event-card {
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.22s;
      background: var(--card);
      box-shadow: var(--sh);
    }
    .pf-event-card:hover {
      border-color: var(--gold-glo);
      transform: translateY(-3px);
      box-shadow: var(--sh2);
    }
    .pf-event-card.active {
      border-color: var(--gold);
    }
    .pf-event-card-img {
      width: 100%;
      aspect-ratio: 3/2;
      object-fit: cover;
      display: block;
    }
    .pf-event-card-body {
      padding: 10px 12px;
    }
    .pf-event-card-cat {
      font-family: var(--fm);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .pf-event-card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 2px;
    }
    .pf-event-card-date {
      font-size: 11px;
      color: var(--text3);
    }

    /* ── CLOSE BOOK BUTTON ── */
    .book-close-btn {
      display: none;
      margin: 20px auto 0;
      background: none;
      border: 1px solid var(--border2);
      color: var(--text2);
      font-family: var(--fb);
      font-size: 12px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .book-close-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
    .book-close-btn.visible { display: block; }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .pf-page { padding: 60px 12px 80px; }
      .pf-title { margin-bottom: 44px; }
      .book-ev-name { font-size: 12px; }
      .book-ev-info { bottom: 26px; left: 14px; }
      .book-ev-info.right { left: auto; right: 14px; }
      .book-arrow { width: 34px; height: 34px; font-size: 14px; }
      .pf-events-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
    }
  </style>
</head>
<body>

  <!-- Firebase (same setup as admin) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="auth.js"></script>

  <div id="ig-nav"></div>
  <script src="nav.js"></script>
  <script>renderNav('portfolio.html');</script>

  <div class="page-wrap">
    <div class="pf-page">

      <div class="pf-label">Our Work</div>
      <h1 class="pf-title">ImpactGrid Events<br><em>Portfolio</em></h1>

      <!-- EVENT PICKER GRID -->
      <div id="pfEventsGrid" style="width:100%;">
        <div class="pf-events-label">Select an event to explore</div>
        <div class="pf-events-grid" id="pfEventCards">
          <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3);font-size:13px;">Loading events…</div>
        </div>
      </div>

      <!-- THE BOOK (hidden until an event is chosen) -->
      <div id="pfBookWrap" style="display:none;width:100%;">
        <div class="book-scene" id="bookScene">

        <div class="book-root" id="bookRoot">
          <!-- Loading state -->
          <div class="book-loading" id="bookLoading">Loading portfolio…</div>

          <!-- Left fixed half (shows "previous right page" or cover) -->
          <div class="book-half book-half-left" id="bookLeft">
            <img id="bookLeftImg" src="" alt=""/>
            <div class="book-ev-ov"></div>
            <div class="book-ev-info" id="bookLeftInfo"></div>
            <div class="book-pg-num" id="bookLeftNum"></div>
          </div>

          <!-- Right fixed half (shows current right page) -->
          <div class="book-half book-half-right" id="bookRight">
            <img id="bookRightImg" src="" alt=""/>
            <div class="book-ev-ov"></div>
            <div class="book-ev-info right" id="bookRightInfo"></div>
            <div class="book-pg-num" id="bookRightNum"></div>
          </div>

          <!-- Spine -->
          <div class="book-spine"></div>

          <!-- Flip leaf (cloned in JS during animation) -->
          <div class="flip-leaf" id="flipLeaf" style="display:none;">
            <div class="flip-leaf-face"><img id="flipFaceImg" src="" alt=""/></div>
            <div class="flip-leaf-back"><img id="flipBackImg" src="" alt=""/></div>
          </div>

          <!-- Click zones -->
          <div class="book-click-left" id="clickLeft" onclick="bookFlip(-1)">
            <div class="book-arrow">←</div>
          </div>
          <div class="book-click-right" id="clickRight" onclick="bookFlip(1)">
            <div class="book-arrow">→</div>
          </div>
        </div>

        <!-- Status bar below book -->
        <div class="book-status">
          <div class="book-status-label" id="bookStatusLabel"></div>
          <div class="book-status-dots" id="bookDots"></div>
        </div>

        <div class="book-hint">← Flip the pages →  &nbsp;·&nbsp;  Click anywhere on the book</div>
        <button class="book-close-btn visible" id="bookCloseBtn" onclick="closeBook()">✕ Close &amp; pick another event</button>
      </div><!-- /.book-scene -->
      </div><!-- /#pfBookWrap -->

    </div>
  </div>

  <div id="ig-footer"></div>
  <script>renderFooter();</script>

  <script>
  /* ════════════════════════════════════════
     PORTFOLIO BOOK ENGINE
     Storage: Cloudinary  ·  DB: Firebase Firestore
  ════════════════════════════════════════ */

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  var FALLBACK_EVENTS = [
    {
      id: 'e1',
      title: 'Summer Social — Outdoor Gathering',
      description: 'Candid photography for a vibrant community event in Manchester.',
      category: 'Social Event',
      date: 'May 2026',
      cover: 'https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=900&q=85&fit=crop',
      photos: [
        'https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=900&q=85&fit=crop',
        'https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=900&q=85&fit=crop',
        'https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?w=900&q=85&fit=crop',
        'https://images.unsplash.com/photo-1519671482749-fd09be7ccebf?w=900&q=85&fit=crop',
        'https://images.unsplash.com/photo-1501281668745-f7f57925c3b4?w=900&q=85&fit=crop',
        'https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=900&q=85&fit=crop',
      ]
    },
    {
      id: 'e2',
      title: 'Editorial Portrait Session',
      description: 'Styled portrait and fashion photography with branded content delivery.',
      category: 'Portrait Session',
      date: 'Dec 2025',
      cover: 'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=900&q=85&fit=crop',
      photos: [
        'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=900&q=85&fit=crop',
        'https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=900&q=85&fit=crop',
        'https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?w=900&q=85&fit=crop',
        'https://images.unsplash.com/photo-1504257432389-52343af06ae3?w=900&q=85&fit=crop',
      ]
    }
  ];

  /* ── Book state ── */
  var allPages   = [];
  var allEvents  = [];
  var spreadIdx  = 0;
  var totalPages = 0;
  var isFlipping = false;
  var _activeEventId = null;

  /* ════════════════════════════════════════
     FIREBASE INIT (config fetched from backend)
  ════════════════════════════════════════ */
  var _db = null;
  fetch('https://impactgrid-events-api.onrender.com/api/firebase-config')
    .then(function(r){ return r.json(); })
    .then(function(cfg){
      if(!firebase.apps.length){ firebase.initializeApp(cfg); }
      _db = firebase.firestore();
      loadPortfolioEvents();
    })
    .catch(function(){
      /* Firebase unavailable — show fallback */
      renderEventGrid(FALLBACK_EVENTS);
    });

  /* ════════════════════════════════════════
     LOAD EVENTS FROM FIREBASE
  ════════════════════════════════════════ */
  async function loadPortfolioEvents() {
    try {
      if(!_db) throw new Error('Firebase not ready');
      var snap = await _db.collection('portfolio_events')
        .where('is_active', '==', true)
        .orderBy('created_at', 'desc')
        .get();
      var rows = snap.docs.map(function(d){ return Object.assign({ id: d.id }, d.data()); });
      renderEventGrid(rows.length ? rows : FALLBACK_EVENTS);
    } catch(e) {
      console.warn('Portfolio Firebase fetch failed, using fallback:', e);
      renderEventGrid(FALLBACK_EVENTS);
    }
  }

  /* ════════════════════════════════════════
     EVENT PICKER GRID
  ════════════════════════════════════════ */
  function renderEventGrid(events) {
    allEvents = events;
    var container = document.getElementById('pfEventCards');
    if (!events.length) {
      container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3);font-size:13px;">No portfolio events yet.</div>';
      return;
    }
    container.innerHTML = events.map(function(ev, i) {
      return '<div class="pf-event-card" id="pf-card-' + esc(ev.id) + '" onclick="openEvent(' + i + ')">' +
        '<img class="pf-event-card-img" src="' + esc(ev.cover||'') + '" alt="' + esc(ev.title) + '" onerror="this.style.background=\'var(--bg3)\';this.style.minHeight=\'120px\'"/>' +
        '<div class="pf-event-card-body">' +
          '<div class="pf-event-card-cat">' + esc(ev.category||'') + '</div>' +
          '<div class="pf-event-card-title">' + esc(ev.title||'') + '</div>' +
          '<div class="pf-event-card-date">' + esc(ev.date||'') + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  /* ── Open a specific event in the book ── */
  function openEvent(evIdx) {
    var ev = allEvents[evIdx];
    if (!ev) return;

    /* Highlight selected card */
    document.querySelectorAll('.pf-event-card').forEach(function(c){ c.classList.remove('active'); });
    var card = document.getElementById('pf-card-' + ev.id);
    if (card) card.classList.add('active');

    _activeEventId = ev.id;

    /* Build pages just for this event */
    buildPages([ev]);
    spreadIdx  = 0;

    /* Show book, scroll to it */
    document.getElementById('pfBookWrap').style.display = 'block';
    renderSpread(0);

    setTimeout(function(){
      document.getElementById('pfBookWrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 80);
  }

  /* ── Close book and return to grid view ── */
  function closeBook() {
    document.getElementById('pfBookWrap').style.display = 'none';
    document.querySelectorAll('.pf-event-card').forEach(function(c){ c.classList.remove('active'); });
    _activeEventId = null;
    document.getElementById('pfEventsGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  /* ════════════════════════════════════════
     BOOK ENGINE
  ════════════════════════════════════════ */
  function buildPages(events) {
    allPages = [];
    events.forEach(function(ev) {
      var photos = ev.photos || [];
      photos.forEach(function(url, i) {
        allPages.push({
          url: url,
          label: ev.title,
          sublabel: ev.category + '  ·  ' + ev.date,
          isFirst: i === 0
        });
      });
    });
    totalPages = allPages.length;
  }

  function renderSpread(idx) {
    var leftImg   = document.getElementById('bookLeftImg');
    var rightImg  = document.getElementById('bookRightImg');
    var leftInfo  = document.getElementById('bookLeftInfo');
    var rightInfo = document.getElementById('bookRightInfo');
    var leftNum   = document.getElementById('bookLeftNum');
    var rightNum  = document.getElementById('bookRightNum');

    if (idx === 0) {
      var firstPg = allPages[0] || null;
      leftImg.src  = firstPg ? firstPg.url : '';
      leftImg.style.opacity = firstPg ? '1' : '0';
      setInfo(leftInfo, firstPg, false);
      leftNum.textContent = '';
    } else {
      var lpg = allPages[idx - 1];
      leftImg.src = lpg ? lpg.url : '';
      leftImg.style.opacity = lpg ? '1' : '0';
      setInfo(leftInfo, lpg, false);
      leftNum.textContent = lpg ? (idx) + ' / ' + totalPages : '';
    }

    var rpg = allPages[idx];
    if (rpg) {
      rightImg.src = rpg.url;
      rightImg.style.opacity = '1';
      setInfo(rightInfo, rpg, true);
      rightNum.textContent = (idx + 1) + ' / ' + totalPages;
    } else {
      rightImg.src = '';
      rightImg.style.opacity = '0';
      rightInfo.innerHTML = '';
      rightNum.textContent = '';
    }

    updateStatus(idx);
    updateClickZones(idx);
  }

  function setInfo(el, pg, right) {
    if (!pg) { el.innerHTML = ''; return; }
    if (pg.isFirst) {
      el.innerHTML =
        '<div class="book-ev-tag">' + esc(pg.sublabel) + '</div>' +
        '<div class="book-ev-name">' + esc(pg.label) + '</div>';
    } else {
      el.innerHTML = '';
    }
  }

  function updateStatus(idx) {
    var lbl  = document.getElementById('bookStatusLabel');
    var dots = document.getElementById('bookDots');
    var pg   = allPages[idx] || allPages[idx - 1];
    lbl.textContent = pg ? pg.label : '';
    /* For a single-event book, dots show photo position */
    dots.innerHTML = allPages.map(function(_, i) {
      return '<button class="book-status-dot' + (i === idx ? ' active' : '') + '" onclick="jumpToPage(' + i + ')" aria-label="Photo ' + (i+1) + '"></button>';
    }).join('');
  }

  function updateClickZones(idx) {
    document.getElementById('clickLeft').classList.toggle('disabled', idx <= 0);
    document.getElementById('clickRight').classList.toggle('disabled', idx >= totalPages - 1);
  }

  function jumpToPage(idx) {
    if (idx === spreadIdx || isFlipping) return;
    spreadIdx = idx;
    renderSpread(spreadIdx);
  }

  function bookFlip(dir) {
    if (isFlipping) return;
    var newIdx = spreadIdx + dir;
    if (newIdx < 0 || newIdx > totalPages - 1) return;

    isFlipping = true;

    var leaf    = document.getElementById('flipLeaf');
    var faceImg = document.getElementById('flipFaceImg');
    var backImg = document.getElementById('flipBackImg');

    if (dir > 0) {
      var curPg  = allPages[spreadIdx];
      var nextPg = allPages[newIdx];
      faceImg.src = curPg  ? curPg.url  : '';
      backImg.src = nextPg ? nextPg.url : '';
      leaf.style.left            = '50%';
      leaf.style.transformOrigin = 'left center';
      leaf.style.transform       = 'rotateY(0deg)';
      leaf.style.display         = 'block';
      setTimeout(function() {
        leaf.style.transition = 'transform 0.75s cubic-bezier(0.645,0.045,0.355,1)';
        leaf.style.transform  = 'rotateY(-180deg)';
      }, 16);
      setTimeout(function() {
        spreadIdx = newIdx;
        renderSpread(spreadIdx);
        leaf.style.display    = 'none';
        leaf.style.transition = '';
        leaf.style.transform  = '';
        isFlipping = false;
      }, 780);
    } else {
      var curLeftPg = allPages[spreadIdx - 1];
      var prevPg    = allPages[newIdx - 1];
      faceImg.src = prevPg    ? prevPg.url    : '';
      backImg.src = curLeftPg ? curLeftPg.url : '';
      leaf.style.left            = '0%';
      leaf.style.transformOrigin = 'right center';
      leaf.style.transform       = 'rotateY(-180deg)';
      leaf.style.display         = 'block';
      setTimeout(function() {
        leaf.style.transition = 'transform 0.75s cubic-bezier(0.645,0.045,0.355,1)';
        leaf.style.transform  = 'rotateY(0deg)';
      }, 16);
      setTimeout(function() {
        spreadIdx = newIdx;
        renderSpread(spreadIdx);
        leaf.style.display    = 'none';
        leaf.style.transition = '';
        leaf.style.transform  = '';
        isFlipping = false;
      }, 780);
    }
  }

  /* ── Touch / keyboard ── */
  var _tx = 0;
  document.getElementById('bookRoot').addEventListener('touchstart', function(e){ _tx = e.touches[0].clientX; }, {passive:true});
  document.getElementById('bookRoot').addEventListener('touchend', function(e){
    var dx = e.changedTouches[0].clientX - _tx;
    if (Math.abs(dx) > 44) bookFlip(dx < 0 ? 1 : -1);
  });
  document.addEventListener('keydown', function(e){
    if (e.key === 'ArrowRight') bookFlip(1);
    if (e.key === 'ArrowLeft')  bookFlip(-1);
    if (e.key === 'Escape')     closeBook();
  });
  </script>

</body>
</html>
