  <style>
    :root { --pf: 'Fraunces', Georgia, serif; }

    /* ═══════════════════════════════════════
       PAGE WRAPPER
    ═══════════════════════════════════════ */
    .pf-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px 100px;
    }

    .pf-label {
      font-family: var(--fm);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 16px;
    }
    .pf-title {
      font-family: var(--fb);
      font-size: clamp(36px, 4.5vw, 64px);
      font-weight: 900;
      line-height: 1.04;
      letter-spacing: -0.03em;
      color: var(--text);
      text-align: center;
      margin-bottom: 64px;
    }
    .pf-title em { font-style: italic; color: var(--text); }

    /* ═══════════════════════════════════════
       BOOK SCENE
    ═══════════════════════════════════════ */
    .book-scene {
      perspective: 2400px;
      width: min(1400px, 98vw);
      margin: 0 auto;
      position: relative;
    }

    /* Glow under the book */
    .book-scene::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 55%;
      height: 50px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.18) 0%, transparent 70%);
      filter: blur(14px);
      pointer-events: none;
    }

    .book-root {
      position: relative;
      width: 100%;
      /* 2:3 aspect per page, two pages side by side */
      aspect-ratio: 2 / 1.1;
      transform-style: preserve-3d;
    }

    /* ── FIXED LEFT & RIGHT HALVES ── */
    /* These are the "resting" pages always visible */
    .book-half {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      overflow: hidden;
    }
    .book-half-left {
      left: 0;
      border-radius: 6px 0 0 6px;
      box-shadow: -6px 8px 40px rgba(0,0,0,0.45), -2px 0 8px rgba(0,0,0,0.2);
      background: #1a1410;
    }
    .book-half-right {
      right: 0;
      border-radius: 0 6px 6px 0;
      box-shadow: 6px 8px 40px rgba(0,0,0,0.45), 2px 0 8px rgba(0,0,0,0.2);
      background: #1a1410;
    }
    .book-half img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
      background: #0d0d0d;
    }

    /* Page number badges */
    .book-pg-num {
      position: absolute;
      bottom: 14px;
      font-family: var(--fm);
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      background: rgba(0,0,0,0.35);
      padding: 3px 10px;
      border-radius: 100px;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }
    .book-half-left .book-pg-num  { left: 18px; }
    .book-half-right .book-pg-num { right: 18px; }

    /* Event label overlay bottom-left / bottom-right */
    .book-ev-ov {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.68) 0%, transparent 50%);
      pointer-events: none;
    }
    .book-ev-info {
      position: absolute;
      bottom: 36px;
      left: 24px;
      pointer-events: none;
    }
    .book-ev-info.right { left: auto; right: 24px; text-align: right; }
    .book-ev-tag {
      font-family: var(--fm);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-bottom: 4px;
    }
    .book-ev-name {
      font-family: var(--pf);
      font-size: clamp(13px, 1.6vw, 20px);
      font-weight: 300;
      color: #fff;
      line-height: 1.2;
    }

    /* ── SPINE ── */
    .book-spine {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 18px;
      height: 100%;
      z-index: 50;
      pointer-events: none;
      /* dark groove */
      background: linear-gradient(to right,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.15) 30%,
        rgba(255,255,255,0.04) 50%,
        rgba(0,0,0,0.15) 70%,
        rgba(0,0,0,0.55) 100%
      );
    }

    /* ── FLIPPING PAGE ── */
    /* This sits on top and animates */
    .flip-leaf {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      transform-style: preserve-3d;
      transform-origin: left center;
      transition: transform 0.75s cubic-bezier(0.645, 0.045, 0.355, 1.000);
      z-index: 30;
      pointer-events: none;
    }
    .flip-leaf.from-right {
      left: 50%;
      transform-origin: left center;
    }
    .flip-leaf.flipping-fwd {
      animation: flipFwd 0.75s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards;
    }
    .flip-leaf.flipping-back {
      animation: flipBack 0.75s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards;
    }

    @keyframes flipFwd {
      0%   { transform: rotateY(0deg); left: 50%; transform-origin: left center; }
      100% { transform: rotateY(-180deg); left: 50%; transform-origin: left center; }
    }
    @keyframes flipBack {
      0%   { transform: rotateY(-180deg); left: 0%; transform-origin: right center; }
      100% { transform: rotateY(0deg); left: 0%; transform-origin: right center; }
    }

    .flip-leaf-face, .flip-leaf-back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }
    .flip-leaf-face {
      border-radius: 0 4px 4px 0;
      box-shadow: 6px 0 20px rgba(0,0,0,0.3);
    }
    .flip-leaf-back {
      transform: rotateY(180deg);
      border-radius: 6px 0 0 6px;
      box-shadow: -6px 0 20px rgba(0,0,0,0.3);
    }
    .flip-leaf-face img, .flip-leaf-back img {
      width: 100%; height: 100%;
      object-fit: contain; display: block;
      background: #0d0d0d;
    }
    /* page-turn shadow / curl shading */
    .flip-leaf-face::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to left, rgba(0,0,0,0.28) 0%, transparent 35%);
      pointer-events: none;
    }
    .flip-leaf-back::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(0,0,0,0.28) 0%, transparent 35%);
      pointer-events: none;
    }

    /* ── CLICK ZONES ── */
    .book-click-left,
    .book-click-right {
      position: absolute;
      top: 0; width: 50%; height: 100%;
      z-index: 40;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .book-click-left  { left: 0; }
    .book-click-right { right: 0; }

    .book-arrow {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: rgba(255,255,255,0.7);
      transition: all 0.2s;
      opacity: 0;
    }
    .book-click-left:hover  .book-arrow,
    .book-click-right:hover .book-arrow { opacity: 1; background: rgba(255,255,255,0.16); }
    .book-click-left.disabled,
    .book-click-right.disabled { cursor: default; }
    .book-click-left.disabled  .book-arrow,
    .book-click-right.disabled .book-arrow { display: none; }

    /* ── BOOK STATUS BAR ── */
    .book-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      margin-top: 36px;
    }
    .book-status-label {
      font-family: var(--pf);
      font-size: 15px;
      font-weight: 300;
      font-style: italic;
      color: var(--text2);
      min-width: 160px;
      text-align: center;
    }
    .book-status-dots {
      display: flex; gap: 7px; align-items: center;
    }
    .book-status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--border2);
      border: none; cursor: pointer; padding: 0;
      transition: all 0.25s;
    }
    .book-status-dot.active {
      background: var(--text);
      transform: scale(1.45);
    }

    /* ── HINT TEXT ── */
    .book-hint {
      margin-top: 20px;
      font-family: var(--fm);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
    }

    /* ── LOADING / EMPTY ── */
    .book-loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--card);
      border-radius: 6px;
      font-family: var(--fm);
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .pf-page { padding: 60px 12px 80px; }
      .pf-title { margin-bottom: 44px; }
      .book-ev-name { font-size: 12px; }
      .book-arrow { width: 34px; height: 34px; font-size: 14px; }

      /* ── SINGLE PAGE MODE ──
         The two-page spread needs real horizontal room to stay
         readable; on a phone it just shrinks until you have to zoom.
         Navigation already tracks one "current page" index and slides
         a left/right window over it (see renderSpread()), so showing
         only the right half — full width, one photo at a time — needs
         zero JS changes. Tap zones (left half = prev, right half =
         next) are separate overlay elements already spanning the full
         book, so they keep working exactly as before. */
      .book-root { aspect-ratio: 3 / 4; }
      .book-half-left, .book-spine { display: none; }
      .book-half-right {
        width: 100%;
        left: 0;
        border-radius: 6px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.45);
      }
      .book-ev-info { bottom: 26px; left: 14px; }
      .book-ev-info.right { left: 14px; right: auto; text-align: left; }
    }
  </style>

  <div class="page-wrap">
    <div class="pf-page">

      <h1 class="pf-title">Portfolio</h1>

      <!-- THE BOOK -->
      <div class="book-scene" id="bookScene">

        <div class="book-root" id="bookRoot">

          <div class="book-loading" id="bookLoading">Loading portfolio…</div>

        <!-- Status bar below book -->
        <div class="book-status">
          <div class="book-status-label" id="bookStatusLabel"></div>
          <div class="book-status-dots" id="bookDots"></div>
        </div>

        <div class="book-hint">← Flip the pages →  &nbsp;·&nbsp;  Click anywhere on the book</div>
      </div>

    </div>

  <script>
  /* ════════════════════════════════════════
     PORTFOLIO BOOK ENGINE
     
     Model: one "spread" = two facing photos.
     Each event's photos are split into spreads:
       spread 0 → photos[0] (right) + cover photo left side
       spread 1 → photos[0] left + photos[1] right
       spread 2 → photos[1] left + photos[2] right …
     
     When user flips forward:
       - animate: right page peels left
       - left becomes old right, right advances
     When user flips back:
       - animate: left page peels right
  ════════════════════════════════════════ */

  var FALLBACK_EVENTS = [
    {
      id: 'e1',
      title: 'Summer Social — Outdoor Gathering',
      description: 'Candid photography for a vibrant community event in Manchester.',
      category: 'Social Event',
      date: 'May 2026',
      cover: 'https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=900&q=85&fit=crop',
      photos: [
        'https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=900&q=85&fit=crop',
        'https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=900&q=85&fit=crop',
        'https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?w=900&q=85&fit=crop',
        'https://images.unsplash.com/photo-1519671482749-fd09be7ccebf?w=900&q=85&fit=crop',
        'https://images.unsplash.com/photo-1501281668745-f7f57925c3b4?w=900&q=85&fit=crop',
        'https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=900&q=85&fit=crop',
      ]
    },
    {
      id: 'e2',
      title: 'Editorial Portrait Session',
      description: 'Styled portrait and fashion photography with branded content delivery.',
      category: 'Portrait Session',
      date: 'Dec 2025',
      cover: 'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=900&q=85&fit=crop',
      photos: [
        'https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=900&q=85&fit=crop',
        'https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=900&q=85&fit=crop',
        'https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?w=900&q=85&fit=crop',
        'https://images.unsplash.com/photo-1504257432389-52343af06ae3?w=900&q=85&fit=crop',
      ]
    }
  ];

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  /* ── Build a flat list of page-images from all events ── */
  /* Page 0 = special cover page (first event cover, full spread)
     Then each photo is one page in sequence, with events interleaved */
  var allPages = []; // {url, label, sublabel, isFirst}
  var allEvents = [];
  var spreadIdx = 0;   // current left page index (0 = cover left)
  var totalPages = 0;
  var isFlipping = false;

  function buildPages(events) {
    allPages = [];
    events.forEach(function(ev) {
      var photos = ev.photos || [];
      photos.forEach(function(url, i) {
        allPages.push({
          url: url,
          label: ev.title,
          sublabel: ev.category + '  ·  ' + ev.date,
          isFirst: i === 0
        });
      });
    });
    totalPages = allPages.length;
  }

  /* ── Render the static left/right halves for spreadIdx ── */
  /* Left shows page[spreadIdx-1] (or blank for cover)
     Right shows page[spreadIdx] */
  function renderSpread(idx) {
    var leftImg  = document.getElementById('bookLeftImg');
    var rightImg = document.getElementById('bookRightImg');
    var leftInfo  = document.getElementById('bookLeftInfo');
    var rightInfo = document.getElementById('bookRightInfo');
    var leftNum  = document.getElementById('bookLeftNum');
    var rightNum = document.getElementById('bookRightNum');

    /* LEFT page = idx - 1 */
    if (idx === 0) {
      /* Cover: show first photo on both sides or a dark cover */
      var firstPg = allPages[0] || null;
      leftImg.src  = firstPg ? firstPg.url : '';
      leftImg.style.opacity = firstPg ? '1' : '0';
      setInfo(leftInfo, firstPg, false);
      leftNum.textContent = '';
    } else {
      var lpg = allPages[idx - 1];
      leftImg.src = lpg ? lpg.url : '';
      leftImg.style.opacity = lpg ? '1' : '0';
      setInfo(leftInfo, lpg, false);
      leftNum.textContent = lpg ? (idx) + ' / ' + totalPages : '';
    }

    /* RIGHT page = idx */
    var rpg = allPages[idx];
    if (rpg) {
      rightImg.src = rpg.url;
      rightImg.style.opacity = '1';
      setInfo(rightInfo, rpg, true);
      rightNum.textContent = (idx + 1) + ' / ' + totalPages;
    } else {
      /* End of book */
      rightImg.src = '';
      rightImg.style.opacity = '0';
      rightInfo.innerHTML = '';
      rightNum.textContent = '';
    }

    updateStatus(idx);
    updateClickZones(idx);
  }

  function setInfo(el, pg, right) {
    if (!pg) { el.innerHTML = ''; return; }
    if (pg.isFirst) {
      el.innerHTML =
        '<div class="book-ev-tag">' + esc(pg.sublabel) + '</div>' +
        '<div class="book-ev-name">' + esc(pg.label) + '</div>';
    } else {
      el.innerHTML = '';
    }
  }

  function updateStatus(idx) {
    var lbl = document.getElementById('bookStatusLabel');
    var dots = document.getElementById('bookDots');
    /* Which event are we currently on? */
    var pg = allPages[idx] || allPages[idx - 1];
    if (pg) {
      lbl.textContent = pg.label;
    } else {
      lbl.textContent = '';
    }
    /* Dots = one per event */
    /* Figure out which event the current spread is from */
    var evIdx = 0;
    if (allEvents.length) {
      var count = 0;
      for (var e = 0; e < allEvents.length; e++) {
        count += (allEvents[e].photos || []).length;
        if (idx < count) { evIdx = e; break; }
        evIdx = e;
      }
    }
    dots.innerHTML = allEvents.map(function(_, i) {
      return '<button class="book-status-dot' + (i === evIdx ? ' active' : '') + '" onclick="jumpToEvent(' + i + ')" aria-label="Event ' + (i+1) + '"></button>';
    }).join('');
  }

  function updateClickZones(idx) {
    document.getElementById('clickLeft').classList.toggle('disabled', idx <= 0);
    document.getElementById('clickRight').classList.toggle('disabled', idx >= totalPages - 1);
  }

  /* ── Jump to the first photo of an event ── */
  function jumpToEvent(evIdx) {
    var target = 0;
    for (var i = 0; i < evIdx; i++) {
      target += (allEvents[i].photos || []).length;
    }
    if (target === spreadIdx) return;
    spreadIdx = target;
    renderSpread(spreadIdx);
  }

  /* ── Flip animation ── */
  function bookFlip(dir) {
    if (isFlipping) return;
    var newIdx = spreadIdx + dir;
    if (newIdx < 0 || newIdx > totalPages - 1) return;

    /* On mobile the book shows one full-width page (see the
       max-width:700px CSS) instead of a left/right spread. Reuse the
       same flip-leaf mechanism, just resized to the full width — same
       page-turn feel, correctly sized for a single page. */
    if (window.innerWidth <= 700) {
      isFlipping = true;
      var mLeaf = document.getElementById('flipLeaf');
      var mFace = document.getElementById('flipFaceImg');
      var mBack = document.getElementById('flipBackImg');
      var curPg = allPages[spreadIdx];
      var tgtPg = allPages[newIdx];

      mFace.src = curPg ? curPg.url : '';
      mBack.src = tgtPg ? tgtPg.url : '';

      mLeaf.style.left  = '0%';
      mLeaf.style.width = '100%';
      mLeaf.style.transformOrigin = (dir > 0) ? 'left center' : 'right center';
      mLeaf.style.transform = 'rotateY(0deg)';
      mLeaf.style.display = 'block';

      setTimeout(function() {
        mLeaf.style.transition = 'transform 0.75s cubic-bezier(0.645,0.045,0.355,1)';
        mLeaf.style.transform = (dir > 0) ? 'rotateY(-180deg)' : 'rotateY(180deg)';
      }, 16);

      setTimeout(function() {
        spreadIdx = newIdx;
        renderSpread(spreadIdx);
        mLeaf.style.display = 'none';
        mLeaf.style.transition = '';
        mLeaf.style.transform  = '';
        mLeaf.style.width      = '';
        isFlipping = false;
      }, 780);

      return;
    }

    isFlipping = true;

    var leaf = document.getElementById('flipLeaf');
    var faceImg = document.getElementById('flipFaceImg');
    var backImg = document.getElementById('flipBackImg');

    if (dir > 0) {
      /* Forward: right page peels to left */
      /* Face = current right page, Back = next right page */
      var curPg  = allPages[spreadIdx];
      var nextPg = allPages[newIdx];

      faceImg.src = curPg ? curPg.url : '';
      backImg.src = nextPg ? nextPg.url : '';

      leaf.style.left = '50%';
      leaf.style.transformOrigin = 'left center';
      leaf.style.transform = 'rotateY(0deg)';
      leaf.style.display = 'block';

      /* Immediately update underlying pages so they show through */
      /* Left will show old right (page being turned) — keep until flip done */
      /* Right will show new page */
      setTimeout(function() {
        leaf.style.transition = 'transform 0.75s cubic-bezier(0.645,0.045,0.355,1)';
        leaf.style.transform = 'rotateY(-180deg)';
      }, 16);

      setTimeout(function() {
        spreadIdx = newIdx;
        renderSpread(spreadIdx);
        leaf.style.display = 'none';
        leaf.style.transition = '';
        leaf.style.transform = '';
        isFlipping = false;
      }, 780);

    } else {
      /* Backward: left page flips back to right */
      var curLeftPg = allPages[spreadIdx - 1];
      var prevPg    = allPages[newIdx - 1];

      /* Face (seen from left side after flip) = prev left page
         Back (seen from right before flip starts) = current left */
      faceImg.src = prevPg    ? prevPg.url    : '';
      backImg.src = curLeftPg ? curLeftPg.url : '';

      leaf.style.left = '0%';
      leaf.style.transformOrigin = 'right center';
      leaf.style.transform = 'rotateY(-180deg)';
      leaf.style.display = 'block';

      setTimeout(function() {
        leaf.style.transition = 'transform 0.75s cubic-bezier(0.645,0.045,0.355,1)';
        leaf.style.transform = 'rotateY(0deg)';
      }, 16);

      setTimeout(function() {
        spreadIdx = newIdx;
        renderSpread(spreadIdx);
        leaf.style.display = 'none';
        leaf.style.transition = '';
        leaf.style.transform = '';
        isFlipping = false;
      }, 780);
    }
  }

  /* ── Touch / keyboard ── */
  var _tx = 0;
  document.getElementById('bookRoot').addEventListener('touchstart', function(e){ _tx = e.touches[0].clientX; }, {passive:true});
  document.getElementById('bookRoot').addEventListener('touchend', function(e){
    var dx = e.changedTouches[0].clientX - _tx;
    if (Math.abs(dx) > 44) bookFlip(dx < 0 ? 1 : -1);
  });
  document.addEventListener('keydown', function(e){
    if (e.key === 'ArrowRight') bookFlip(1);
    if (e.key === 'ArrowLeft')  bookFlip(-1);
  });

  /* ── Load photos from Firebase portfolio_photos flat collection ── */
  var _pfDb = null;

  async function loadEvents() {
    try {
      var cfg = await fetch('https://impactgrid-events-api.onrender.com/api/firebase-config').then(function(r){ return r.json(); });
      if (!firebase.apps.length) firebase.initializeApp(cfg);
      _pfDb = firebase.firestore();
      var snap = await _pfDb.collection('portfolio_photos')
        .orderBy('created_at', 'desc')
        .get();
      var photos = snap.docs.map(function(d){ return d.data().url; }).filter(Boolean);
      if (photos.length) {
        usePhotos(photos);
      } else {
        /* Fallback to demo photos */
        usePhotos(FALLBACK_EVENTS.reduce(function(a,e){ return a.concat(e.photos); }, []));
      }
    } catch(e) {
      console.warn('Portfolio Firebase fetch failed, using fallback:', e);
      usePhotos(FALLBACK_EVENTS.reduce(function(a,e){ return a.concat(e.photos); }, []));
    }
  }

  function usePhotos(photoUrls) {
    /* Wrap flat photo list into the single-event structure the book engine expects */
    allEvents = [{ id: 'portfolio', title: 'Portfolio', category: '', date: '', photos: photoUrls }];
    buildPages(allEvents);
    document.getElementById('bookLoading').style.display = 'none';
    spreadIdx = 0;
    renderSpread(0);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadEvents);
  } else {
    loadEvents();
  }
  </script>

</body>
