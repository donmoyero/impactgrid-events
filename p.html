<head>

<style>
.ig-loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#080810;color:rgba(255,255,255,.5);font-family:'DM Sans',sans-serif;gap:16px}
.ig-loading-spinner{width:36px;height:36px;border-radius:50%;border:2.5px solid rgba(255,255,255,.1);border-top-color:#c97e08;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ig-loading-text{font-size:13px;letter-spacing:.05em}
.ig-error{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#080810;color:rgba(255,255,255,.7);font-family:'DM Sans',sans-serif;gap:12px;text-align:center;padding:40px 20px}
.ig-error-code{font-size:80px;font-weight:800;font-family:'Syne',sans-serif;background:linear-gradient(135deg,#c97e08,#f0b429);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.ig-error h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;margin:0}
.ig-error p{font-size:14px;color:rgba(255,255,255,.45);max-width:360px;line-height:1.7}
.ig-error a{margin-top:8px;padding:11px 24px;background:#c97e08;color:#fff;border-radius:9px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;text-decoration:none;transition:.15s}
.ig-error a:hover{opacity:.85}
</style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KVJC5DE2WT"></script>

</head>
<body>
<div class="ig-loading" id="igLoading">
  <div class="ig-loading-spinner"></div>
  <div class="ig-loading-text">Loading portfolio…</div>
</div>
<script>
var IG_CONTENT_URL  = 'https://exeiojgldxqaakkybdij.supabase.co';
var IG_CONTENT_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4ZWlvamdsZHhxYWFra3liZGlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDc4NTcsImV4cCI6MjA4ODkyMzg1N30.aRXgeHqaOxkidwpWVGEOKBQAeo9_C5Fk3Gu5ZlbmxTQ';

function getSlug() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('slug')) return params.get('slug');
  var parts = window.location.pathname.split('/').filter(Boolean);
  var last  = parts[parts.length - 1];
  if (last && last !== 'p.html' && last !== 'p') return last;
  return null;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function cleanCta(s) { return esc(String(s||'').replace(/\s*\(mailto:[^)]*\)/gi,'').replace(/\s*\[([^\]]*)]\([^)]*\)/g,'$1').trim()); }

function showError(code, title, message) {
  document.getElementById('igLoading').outerHTML =
    '<div class="ig-error"><div class="ig-error-code">' + code + '</div>' +
    '<h1>' + title + '</h1><p>' + message + '</p>' +
    '<a href="https://impactgridgroup.com">Go to ImpactGrid →</a></div>';
}

async function loadPortfolio() {
  var slug = getSlug();
  if (!slug) { showError('404','Portfolio not found','No portfolio slug was provided.'); return; }
  try {
    var res = await fetch(
      IG_CONTENT_URL + '/rest/v1/portfolios?slug=eq.' + encodeURIComponent(slug) +
      '&published=eq.true&select=*&limit=1',
      { headers: { 'apikey': IG_CONTENT_ANON, 'Authorization': 'Bearer ' + IG_CONTENT_ANON } }
    );
    if (!res.ok) throw new Error('Supabase error: ' + res.status);
    var rows = await res.json();
    if (!rows || !rows.length) { showError('404','Portfolio not found','This portfolio may have been deleted or is not published yet.'); return; }
    renderPortfolio(rows[0]);
  } catch (err) {
    console.error('[ImpactGrid]', err.message);
    showError('500','Something went wrong','We couldn\'t load this portfolio right now. Please try again in a moment.');
  }
}

function renderPortfolio(pf) {

  /* ─────────────────────────────────────────────
     THEME DEFINITIONS
  ───────────────────────────────────────────── */
  var THEMES = {
    'dark':           { bg:'#080810', sf:'#10101e', tx:'#e2e8f0', sub:'rgba(226,232,240,0.5)', bd:'rgba(255,255,255,0.06)', ac:'#c97e08', fh:"'Syne',sans-serif", fb:"'DM Sans',sans-serif", r:'14px', layout:'dark' },
    'dark-gold':      { bg:'#07060a', sf:'#130f04', tx:'#f5ead5', sub:'rgba(245,234,213,0.5)', bd:'rgba(201,168,76,0.15)', ac:'#c9a84c', fh:"Georgia,serif", fb:"'DM Sans',sans-serif", r:'0px', layout:'dark' },
    'clean':          { bg:'#f8fafc', sf:'#ffffff', tx:'#0d1017', sub:'#4a5068', bd:'rgba(0,0,0,0.07)', ac:'#2d6edb', fh:"'Syne',sans-serif", fb:"'DM Sans',sans-serif", r:'4px', layout:'light' },
    'clean-light':    { bg:'#f0f2f5', sf:'#ffffff', tx:'#111827', sub:'#6b7280', bd:'rgba(0,0,0,0.08)', ac:'#1d4ed8', fh:"'Syne',sans-serif", fb:"'DM Sans',sans-serif", r:'2px', layout:'light' },
    'rose':           { bg:'#0e0008', sf:'#1a0012', tx:'#fce7ef', sub:'rgba(252,231,239,0.55)', bd:'rgba(255,255,255,0.07)', ac:'#f43f80', fh:"Georgia,serif", fb:"'DM Sans',sans-serif", r:'20px', layout:'dark' },
    'rose-editorial': { bg:'#0e0008', sf:'#1a0012', tx:'#fce7ef', sub:'rgba(252,231,239,0.55)', bd:'rgba(255,255,255,0.07)', ac:'#e879a0', fh:"Georgia,serif", fb:"'DM Sans',sans-serif", r:'20px', layout:'dark' },
    'midnight':       { bg:'#020b14', sf:'#061525', tx:'#cef5ff', sub:'rgba(206,245,255,0.5)', bd:'rgba(6,182,212,0.2)', ac:'#06b6d4', fh:"'Courier New',monospace", fb:"'Courier New',monospace", r:'0px', layout:'dark' },
    'midnight-tech':  { bg:'#030712', sf:'#0c1220', tx:'#e2e8f0', sub:'rgba(226,232,240,0.5)', bd:'rgba(6,182,212,0.18)', ac:'#06b6d4', fh:"'Courier New',monospace", fb:"'Courier New',monospace", r:'0px', layout:'dark' },
    'forest':         { bg:'#0d1f12', sf:'#162a1c', tx:'#e8f5e2', sub:'rgba(232,245,226,0.55)', bd:'rgba(255,255,255,0.07)', ac:'#5cb85c', fh:"'Syne',sans-serif", fb:"'DM Sans',sans-serif", r:'24px', layout:'dark' },
    'forest-organic': { bg:'#0d1f12', sf:'#162a1c', tx:'#e8f5e2', sub:'rgba(232,245,226,0.55)', bd:'rgba(255,255,255,0.07)', ac:'#4ade80', fh:"'Syne',sans-serif", fb:"'DM Sans',sans-serif", r:'24px', layout:'dark' },
    'navy':           { bg:'#05091a', sf:'#0c1230', tx:'#e8eaf6', sub:'rgba(232,234,246,0.5)', bd:'rgba(255,255,255,0.07)', ac:'#2d6edb', fh:"'Syne',sans-serif", fb:"'DM Sans',sans-serif", r:'8px', layout:'dark' },
    'navy-classic':   { bg:'#03071a', sf:'#08102a', tx:'#dde3f8', sub:'rgba(221,227,248,0.5)', bd:'rgba(255,255,255,0.07)', ac:'#4a7ddb', fh:"'Syne',sans-serif", fb:"'DM Sans',sans-serif", r:'8px', layout:'dark' },
    'sunset-brutal':  { bg:'#fff8f0', sf:'#ffffff', tx:'#0a0500', sub:'#6b4c2a', bd:'#0a0500', ac:'#ff5500', fh:"'Syne',sans-serif", fb:"'DM Sans',sans-serif", r:'0px', layout:'light' },
    'smoke-mono':     { bg:'#111113', sf:'#1c1c1f', tx:'#f0f0f2', sub:'rgba(240,240,242,0.45)', bd:'rgba(255,255,255,0.08)', ac:'#a0a0a8', fh:"'Syne',sans-serif", fb:"'DM Sans',sans-serif", r:'6px', layout:'dark' },
    'violet-dreamy':  { bg:'#0a0514', sf:'#120b24', tx:'#ede0ff', sub:'rgba(237,224,255,0.5)', bd:'rgba(167,139,250,0.15)', ac:'#a78bfa', fh:"'Syne',sans-serif", fb:"'DM Sans',sans-serif", r:'18px', layout:'dark' },
    'copper-retro':   { bg:'#1a0f00', sf:'#2a1a00', tx:'#f5e6c8', sub:'rgba(245,230,200,0.5)', bd:'rgba(180,120,40,0.2)', ac:'#c87533', fh:"'Syne',sans-serif", fb:"'DM Sans',sans-serif", r:'0px', layout:'dark' },
  };

  var t      = THEMES[pf.theme] || THEMES['dark'];
  var accent = pf.accent_color || t.ac;
  var isLight = t.layout === 'light';

  var heroImgs = ((pf.hero_media || []).map(function(m){ return m.preview || m.url; })).filter(Boolean).slice(0,4);
  var profilePhotoUrl = pf.profile_photo_url || '';
  var logoUrl  = pf.logo_url || '';
  var initials = (pf.name || 'CR').split(' ').map(function(w){ return w[0]||''; }).join('').toUpperCase().slice(0,2);

  var galleryAllImgs = (pf.gallery_media && pf.gallery_media.length)
    ? (pf.gallery_media.map(function(m){ return m.preview || m.url; })).filter(Boolean)
    : ((pf.hero_media || []).map(function(m){ return m.preview || m.url; })).filter(Boolean);

  var heroImg0 = heroImgs[0] || '';

  document.title = esc(pf.name) + ' — ' + esc(pf.niche) + ' | ImpactGrid';

  var socials = [
    pf.youtube_url   ? { icon:'▶', label:'YouTube',   url:pf.youtube_url,   color:'#ff0000', subs: pf.youtube_subs } : null,
    pf.tiktok_url    ? { icon:'♪', label:'TikTok',    url:pf.tiktok_url,    color:'#69c9d0', subs: pf.tiktok_followers } : null,
    pf.instagram_url ? { icon:'◉', label:'Instagram', url:pf.instagram_url, color:'#e1306c' } : null,
    pf.linkedin_url  ? { icon:'in',label:'LinkedIn',  url:pf.linkedin_url,  color:'#0077b5' } : null,
    pf.twitter_url   ? { icon:'𝕏', label:'Twitter/X', url:pf.twitter_url,   color:'#1d9bf0' } : null,
  ].filter(Boolean);

  var hasServices = pf.services && pf.services.length;

  /* ─── SEO & Schema ─── */
  var seo = pf.seo || {};
  var schemaObj = {
    '@context': 'https://schema.org',
    '@type': seo.schema_type || 'Person',
    'name': pf.name,
    'description': pf.ai_bio || pf.bio || '',
    'url': 'https://impactgrid.app/p/' + (pf.slug || ''),
    'image': heroImg0 || '',
    'jobTitle': pf.niche,
  };
  if (pf.location) schemaObj.address = { '@type': 'PostalAddress', 'addressLocality': pf.location };
  if (pf.email)    schemaObj.email   = pf.email;

  /* ─── Shared HTML helpers ─── */
  function statRow() {
    if (!pf.total_followers && !pf.engagement_rate && !pf.monthly_views) return '';
    return '<div class="stats-row">' +
      (pf.total_followers ? '<div class="stat"><div class="sv">' + esc(pf.total_followers) + '</div><div class="sl2">FOLLOWERS</div></div>' : '') +
      (pf.engagement_rate ? '<div class="stat"><div class="sv">' + esc(pf.engagement_rate) + '</div><div class="sl2">ENGAGEMENT</div></div>' : '') +
      (pf.monthly_views   ? '<div class="stat"><div class="sv">' + esc(pf.monthly_views)   + '</div><div class="sl2">MONTHLY VIEWS</div></div>' : '') +
      (pf.avg_deal        ? '<div class="stat"><div class="sv">' + esc(pf.avg_deal)        + '</div><div class="sl2">AVG DEAL</div></div>' : '') +
    '</div>';
  }

  function socialLinks() {
    return socials.map(function(s){
      return '<a href="' + esc(s.url) + '" target="_blank" class="social-link" style="--lc:' + s.color + '">' +
        '<span class="si">' + s.icon + '</span>' +
        '<div class="sl-info"><span class="sl-label">' + esc(s.label) + '</span>' +
        (s.subs ? '<span class="sl-sub">' + esc(s.subs) + ' followers</span>' : '') + '</div>' +
        '<span class="sa">→</span>' +
      '</a>';
    }).join('');
  }

  function servicesGrid() {
    if (!hasServices) return '';
    return (pf.services || []).map(function(s){
      var imgUrl = s.image_url || s.image || s.img || s.photo || '';
      return '<div class="card service-card">' +
        (imgUrl ? '<div class="service-img-wrap"><img src="' + esc(imgUrl) + '" alt="' + esc(s.title) + '" class="service-img" loading="lazy"/></div>'
                : '<div class="service-icon">' + esc(s.icon||'✦') + '</div>') +
        '<div class="service-title">' + esc(s.title) + '</div>' +
        '<div class="service-desc">' + esc(s.description) + '</div>' +
        (s.price ? '<div class="service-price">' + esc(s.price) + '</div>' : '') +
      '</div>';
    }).join('');
  }

  function contactForm() {
    if (!pf.email) return '';
    return '<div class="cf-form">' +
      '<div class="cf-row">' +
        '<input id="cf-name" type="text" placeholder="Your name" />' +
        '<input id="cf-email" type="email" placeholder="Your email" />' +
      '</div>' +
      '<textarea id="cf-msg" placeholder="Tell me about your project…"></textarea>' +
      '<button class="cf-btn" id="cf-btn" onclick="(async function(){' +
        'var btn=document.getElementById(\'cf-btn\');var status=document.getElementById(\'cf-status\');' +
        'var name=document.getElementById(\'cf-name\').value.trim();' +
        'var email=document.getElementById(\'cf-email\').value.trim();' +
        'var message=document.getElementById(\'cf-msg\').value.trim();' +
        'if(!name||!email||!message){status.style.color=\'#f87171\';status.textContent=\'Please fill in all fields.\';return;}' +
        'btn.disabled=true;btn.textContent=\'Sending…\';' +
        'try{var r=await fetch(\'https://impactgrid-dijo.onrender.com/contact/send\',{method:\'POST\',headers:{\'Content-Type\':\'application/json\'},body:JSON.stringify({name:name,email:email,message:message,creatorEmail:\'' + esc(pf.email) + '\'})});' +
        'var d=await r.json();' +
        'if(d.success){status.style.color=\'#4ade80\';status.textContent=\'Message sent! ✓\';' +
          'document.getElementById(\'cf-name\').value=\'\';document.getElementById(\'cf-email\').value=\'\';document.getElementById(\'cf-msg\').value=\'\';' +
          'btn.textContent=\'Send Message\';btn.disabled=false;}' +
        'else{status.style.color=\'#f87171\';status.textContent=\'Something went wrong. Try again.\';btn.textContent=\'Send Message\';btn.disabled=false;}' +
        '}catch(e){status.style.color=\'#f87171\';status.textContent=\'Server error. Please try again.\';btn.textContent=\'Send Message\';btn.disabled=false;}' +
      '})()">Send Message</button>' +
      '<div class="cf-msg" id="cf-status"></div>' +
    '</div>';
  }

  /* ─── FLIP GALLERY (always the same beautiful feature) ─── */
  var galleryImgs = galleryAllImgs.length > 0 ? galleryAllImgs : [
    'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80',
    'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800&q=80',
    'https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=800&q=80',
    'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=800&q=80',
    'https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=800&q=80',
    'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800&q=80'
  ];
  var totalFlipPages = galleryImgs.length;

  var flipPagesHTML = galleryImgs.map(function(url, i) {
    return '<div class="fp-page" id="fpPage' + i + '" style="z-index:' + (totalFlipPages - i) + '">' +
      '<div class="fp-front">' +
        '<img src="' + esc(url) + '" alt="Gallery image ' + (i+1) + '" loading="lazy"/>' +
        '<div class="fp-page-num">' + (i+1) + ' / ' + totalFlipPages + '</div>' +
        '<div class="fp-crease"></div>' +
      '</div>' +
      '<div class="fp-back">' +
        (i+1 < galleryImgs.length
          ? '<img src="' + esc(galleryImgs[i+1]) + '" alt="Gallery image ' + (i+2) + '" loading="lazy"/>' +
            '<div class="fp-page-num">' + (i+2) + ' / ' + totalFlipPages + '</div>' +
            '<div class="fp-crease back-crease"></div>'
          : '<div class="fp-back-blank"><div class="fp-back-icon">✦</div><div class="fp-back-text">End of Gallery</div></div>') +
      '</div>' +
    '</div>';
  }).join('');

  var flipThumbsHTML = galleryImgs.map(function(url, i) {
    return '<button class="fp-dot' + (i===0?' active':'') + '" onclick="fpGoto(' + i + ')" aria-label="Page ' + (i+1) + '"></button>';
  }).join('');

  /* Gallery piles */
  var galleryPilesHTML = '';
  if (galleryImgs.length > 0) {
    var piles = [];
    for (var pi = 0; pi < galleryImgs.length; pi += 3) { piles.push(galleryImgs.slice(pi, pi + 3)); }
    var pilesInner = piles.map(function(pile, pIdx) {
      var startIdx = pIdx * 3;
      if (pile.length >= 3) {
        return '<div class="gallery-pile" onclick="document.querySelector(\'.fp-stage\').scrollIntoView({behavior:\'smooth\'});fpGoto(' + startIdx + ')" title="View photo ' + (startIdx+1) + '">' +
          '<div class="gp-card gp-back"><img src="' + esc(pile[2]) + '" alt="" loading="lazy"/></div>' +
          '<div class="gp-card gp-mid"><img src="' + esc(pile[1]) + '" alt="" loading="lazy"/></div>' +
          '<div class="gp-card gp-front"><img src="' + esc(pile[0]) + '" alt="" loading="lazy"/></div>' +
          '<div class="gp-label">' + (startIdx+1) + '–' + (startIdx+pile.length) + ' of ' + galleryImgs.length + '</div>' +
        '</div>';
      } else if (pile.length === 2) {
        return '<div class="gallery-pile" onclick="document.querySelector(\'.fp-stage\').scrollIntoView({behavior:\'smooth\'});fpGoto(' + startIdx + ')">' +
          '<div class="gp-card gp-mid" style="transform:rotate(-3.5deg) translate(5px,5px)"><img src="' + esc(pile[1]) + '" alt="" loading="lazy"/></div>' +
          '<div class="gp-card gp-front"><img src="' + esc(pile[0]) + '" alt="" loading="lazy"/></div>' +
          '<div class="gp-label">' + (startIdx+1) + '–' + (startIdx+pile.length) + ' of ' + galleryImgs.length + '</div>' +
        '</div>';
      } else {
        return '<div class="gallery-card-solo" onclick="document.querySelector(\'.fp-stage\').scrollIntoView({behavior:\'smooth\'});fpGoto(' + startIdx + ')">' +
          '<img src="' + esc(pile[0]) + '" alt="" loading="lazy"/>' +
          '<div class="gallery-card-solo-ov"><span>View ↗</span></div>' +
        '</div>';
      }
    }).join('');
    galleryPilesHTML = '<div class="gallery-piles-wrap"><div class="gallery-pile-row">' + pilesInner + '</div></div>';
  }

  var flipGalleryHTML =
    '<section class="page" id="page-gallery">' +
      '<div class="pg-header">' +
        '<div class="sec-lbl">Gallery</div>' +
        '<div class="sec-ttl">My Work</div>' +
      '</div>' +
      '<div class="fp-stage">' +
        '<div class="fp-book-wrap">' +
          '<div class="fp-book" id="fpBook">' + flipPagesHTML + '</div>' +
        '</div>' +
        '<div class="fp-controls">' +
          '<button class="fp-btn fp-btn-prev" onclick="fpStep(-1)" aria-label="Previous">&#8592; Prev</button>' +
          '<div class="fp-dots" id="fpDots">' + flipThumbsHTML + '</div>' +
          '<button class="fp-btn fp-btn-next" onclick="fpStep(1)" aria-label="Next">Next &#8594;</button>' +
        '</div>' +
      '</div>' +
      (galleryImgs.length > 1 ? galleryPilesHTML : '') +
    '</section>';

  /* ─── SERVICES PAGE ─── */
  var servicesPageHTML = hasServices ?
    '<section class="page" id="page-services">' +
      '<div class="pg-header"><div class="sec-lbl">What I Offer</div><div class="sec-ttl">Services &amp; Rates</div></div>' +
      '<div class="grid page-inner">' + servicesGrid() + '</div>' +
      (pf.testimonials && pf.testimonials.length ?
        '<div class="pg-header" style="margin-top:40px"><div class="sec-lbl">Social Proof</div><div class="sec-ttl">What Brands Say</div></div>' +
        '<div class="grid page-inner">' +
          (pf.testimonials || []).map(function(t2){
            return '<div class="card"><div class="testimonial-quote">"' + esc(t2.quote) + '"</div><div class="testimonial-author">— ' + esc(t2.author) + '</div></div>';
          }).join('') +
        '</div>' : '') +
    '</section>' : '';

  /* ─────────────────────────────────────────────
     NAV LINKS
  ───────────────────────────────────────────── */
  var navLinks =
    '<a href="#" class="nav-link active" onclick="showPage(\'page-home\');return false;">Home</a>' +
    '<a href="#" class="nav-link" onclick="showPage(\'page-gallery\');return false;">Gallery</a>' +
    (hasServices ? '<a href="#" class="nav-link" onclick="showPage(\'page-services\');return false;">Services</a>' : '');

  var mobileNavLinks =
    '<a href="#" class="mnav-link active" onclick="showPage(\'page-home\');closeMnav();return false;">Home</a>' +
    '<a href="#" class="mnav-link" onclick="showPage(\'page-gallery\');closeMnav();return false;">Gallery</a>' +
    (hasServices ? '<a href="#" class="mnav-link" onclick="showPage(\'page-services\');closeMnav();return false;">Services</a>' : '');

  var navBrand = logoUrl
    ? '<img src="' + esc(logoUrl) + '" alt="' + esc(pf.name) + '" class="nav-logo"/>'
    : '<span class="nav-name">' + esc(pf.name) + '</span>';

  var ctaLabel = cleanCta(pf.ai_cta || 'Work With Me');

  /* ─────────────────────────────────────────────
     PER-THEME COMPLETE PAGE BUILDERS
  ───────────────────────────────────────────── */

  /* Each function returns { css, homeHTML } for its theme */

    'document.addEventListener("keydown",function(e){if(_activePage==="page-gallery"){if(e.key==="ArrowLeft")fpStep(-1);if(e.key==="ArrowRight")fpStep(1);}});' +
    'document.querySelectorAll(".fp-btn-prev").forEach(function(b){b.id="fpBtnPrev";b.disabled=true});' +
    'document.querySelectorAll(".fp-btn-next").forEach(function(b){b.id="fpBtnNext"});' +
    'var _fpTx=0;var fpBook=document.getElementById("fpBook");var fpWrap=fpBook?fpBook.parentElement:null;' +
    'if(fpWrap){' +
      'fpWrap.addEventListener("touchstart",function(e){_fpTx=e.touches[0].clientX;},{passive:true});' +
      'fpWrap.addEventListener("touchend",function(e){var dx=e.changedTouches[0].clientX-_fpTx;if(Math.abs(dx)>50)fpStep(dx<0?1:-1);});' +
      'fpWrap.addEventListener("click",function(e){var r=fpWrap.getBoundingClientRect();if(e.clientX-r.left>r.width/2)fpStep(1);else fpStep(-1);});' +
    '}' +

    /* Intersection observer */
    'var _obs=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting)x.target.classList.add("fu")});},{threshold:0.1});' +
    'document.querySelectorAll(".card,.social-link,.stat").forEach(function(el){_obs.observe(el)});' +
    '<\/script>' +
    '</body></html>'
  );
  document.close();
}

loadPortfolio();
</script>
