function getSlug() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('slug')) return params.get('slug');
  var parts = window.location.pathname.split('/').filter(Boolean);
  var last  = parts[parts.length - 1];
  if (last && last !== 'p.html' && last !== 'p') return last;
  return null;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function cleanCta(s) { return esc(String(s||'').replace(/\s*\(mailto:[^)]*\)/gi,'').replace(/\s*\[([^\]]*)]\([^)]*\)/g,'$1').trim()); }

function showError(code, title, message) {
  document.getElementById('igLoading').outerHTML =
    '<div class="ig-error"><div class="ig-error-code">' + code + '</div>' +
    '<h1>' + title + '</h1><p>' + message + '</p>' +
    '<a href="https://impactgridgroup.com">Go to ImpactGrid →</a></div>';
}

async function loadPortfolio() {
  var slug = getSlug();
  if (!slug) { showError('404','Portfolio not found','No portfolio slug was provided.'); return; }
  try {
    var res = await fetch(
      IG_CONTENT_URL + '/rest/v1/portfolios?slug=eq.' + encodeURIComponent(slug) +
      '&published=eq.true&select=*&limit=1',
      { headers: { 'apikey': IG_CONTENT_ANON, 'Authorization': 'Bearer ' + IG_CONTENT_ANON } }
    );
    if (!res.ok) throw new Error('Supabase error: ' + res.status);
    var rows = await res.json();
    if (!rows || !rows.length) { showError('404','Portfolio not found','This portfolio may have been deleted or is not published yet.'); return; }
    renderPortfolio(rows[0]);
  } catch (err) {
    console.error('[ImpactGrid]', err.message);
    showError('500','Something went wrong','We couldn\'t load this portfolio right now. Please try again in a moment.');
  }
}

      '.home-socials-wrap{padding:0 20px 36px}' +
      '.contact-wrap{margin:0 20px 56px!important;padding:36px 24px!important}' +
      '.cf-row{grid-template-columns:1fr}' +
      '.pg-header{padding:32px 20px 0}' +
      '.page-inner{padding:24px 20px 60px}' +
      'footer{padding:20px}' +
      '.fp-book-wrap{width:calc(100vw - 24px);max-width:calc(100vw - 24px)}' +
      '.fp-stage{padding:16px 12px 48px}' +
      '.fp-btn{padding:8px 14px;font-size:12px}' +
      '.grid{grid-template-columns:1fr}' +
      '.about-cols{grid-template-columns:1fr;gap:28px}' +
      '.about-photo-wrap{width:100%;height:260px}' +
      '.gallery-grid-wrap{padding:0 16px 56px}' +
      '.gallery-pile-row{gap:40px 36px}' +
    '}' +
    '@media(max-width:480px){' +
      '.headline{font-size:32px;letter-spacing:-1px}' +
      '.hero-btns{flex-direction:column;gap:8px}' +
      '.btn{justify-content:center}' +
    '}' +

    /* SCROLLBAR */
    '::-webkit-scrollbar{width:5px;height:5px}' +
    '::-webkit-scrollbar-track{background:transparent}' +
    '::-webkit-scrollbar-thumb{background:' + (isLight ? 'rgba(0,0,0,0.18)' : 'rgba(255,255,255,0.18)') + ';border-radius:10px}' +
    '::-webkit-scrollbar-thumb:hover{background:' + (isLight ? 'rgba(0,0,0,0.32)' : 'rgba(255,255,255,0.32)') + '}' +
    'html{scrollbar-width:thin;scrollbar-color:' + (isLight ? 'rgba(0,0,0,0.18)' : 'rgba(255,255,255,0.18)') + ' transparent}' +

    /* BUTTON INTERACTIONS */
    'button,a{-webkit-tap-highlight-color:transparent;touch-action:manipulation}' +
    '.btn{position:relative;overflow:hidden}' +
    '.btn::after{content:\'\';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .15s;border-radius:inherit;pointer-events:none}' +
    '.btn:hover::after{background:rgba(255,255,255,0.06)}' +
    '.btn:active{transform:scale(0.97)!important;transition:transform .08s ease!important}' +
    '.btn-p{box-shadow:0 4px 20px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.08)!important}' +
    '.btn-p:hover{opacity:1!important;transform:translateY(-2px)!important;box-shadow:0 8px 30px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.1)!important}' +
    '.btn-s{box-shadow:0 2px 10px rgba(0,0,0,.2)}' +
    '.btn-s:hover{box-shadow:0 4px 18px rgba(0,0,0,.3)}' +
    '.nav-cta{box-shadow:0 2px 12px rgba(0,0,0,.25)}' +
    '.nav-cta:hover{opacity:1!important;transform:translateY(-1px);box-shadow:0 4px 18px rgba(0,0,0,.35)}' +
    '.fp-btn{box-shadow:0 2px 10px rgba(0,0,0,.2)}' +
    '.fp-btn:hover{box-shadow:0 4px 16px rgba(0,0,0,.3)}' +
    '.cf-btn{box-shadow:0 3px 14px rgba(0,0,0,.25)}' +
    '.cf-btn:hover{opacity:1!important;transform:translateY(-1px)!important;box-shadow:0 6px 22px rgba(0,0,0,.35)!important}' +
    '.nav-link{transition:all .15s ease}' +
    '.mnav-link{transition:all .15s ease}' +
    '.social-link{box-shadow:0 1px 6px rgba(0,0,0,.15)}' +
    '.social-link:hover{box-shadow:0 4px 18px rgba(0,0,0,.25)}' +
    '@media(hover:none) and (pointer:coarse){' +
      '.btn-p:active{transform:scale(0.96)!important;box-shadow:0 0 0 4px rgba(255,255,255,0.12)!important}' +
      '.btn-s:active{transform:scale(0.96)!important;background:rgba(255,255,255,.08)!important}' +
      '.nav-cta:active{transform:scale(0.96)!important}' +
      '.cf-btn:active{transform:scale(0.97)!important}' +
      '.social-link:active{transform:translateX(2px)!important;box-shadow:0 3px 14px rgba(0,0,0,.25)!important}' +
      '.fp-btn{min-height:44px;padding:10px 18px}' +
    '}' +
    'button:focus-visible,.btn:focus-visible{outline:2px solid var(--ac);outline-offset:2px}' +

    /* THEME EXTRAS */
    themeExtras +

    '</style></head><body>' +

    /* NAV */
    '<nav class="nav">' +
      '<div class="nav-brand">' +
        (logoUrl
          ? '<img src="' + esc(logoUrl) + '" alt="' + esc(pf.name) + '" class="nav-logo"/>'
          : esc(pf.name)) +
      '</div>' +
      '<div class="nav-links">' + navLinks + '</div>' +
      (pf.email ? '<a class="nav-cta" href="mailto:' + esc(pf.email) + '">' + cleanCta(pf.ai_cta || 'Work With Me') + '</a>' : '') +
      '<div class="nav-hamburger" onclick="openMnav()" aria-label="Menu">' +
        '<span></span><span></span><span></span>' +
      '</div>' +
    '</nav>' +

    /* MOBILE NAV */
    '<div class="mnav" id="mnavOverlay">' +
      '<div class="mnav-backdrop" onclick="closeMnav()"></div>' +
      '<div class="mnav-drawer">' +
        '<div class="mnav-close" onclick="closeMnav()">✕</div>' +
        mobileNavLinks +
        (pf.email ? '<a href="mailto:' + esc(pf.email) + '" class="mnav-cta">' + cleanCta(pf.ai_cta || 'Work With Me') + '</a>' : '') +
      '</div>' +
    '</div>' +

    /* PAGES */
    homePageHTML +
    (galleryPageHTML || '') +
    (servicesPageHTML || '') +

    /* FOOTER */
    '<footer>' +
      '<div style="font-family:var(--fh);font-size:14px;font-weight:700">' +
        (logoUrl ? '<img src="' + esc(logoUrl) + '" alt="' + esc(pf.name) + '" style="height:28px;object-fit:contain"/>' : esc(pf.name)) +
      '</div>' +
      '<div class="fl">' +
        (pf.ai_terms   ? '<a style="cursor:pointer" onclick="document.getElementById(\'tm\').classList.add(\'show\')">Terms &amp; Conditions</a>' : '') +
        (pf.ai_privacy ? '<a style="cursor:pointer" onclick="document.getElementById(\'pm\').classList.add(\'show\')">Privacy Policy</a>' : '') +
        (pf.email      ? '<a href="mailto:' + esc(pf.email) + '">Contact</a>' : '') +
      '</div>' +
      '<div style="font-size:11px;color:var(--sub)">Made with <a href="https://impactgridgroup.com" target="_blank" style="color:var(--ac)">ImpactGrid ✦</a></div>' +
    '</footer>' +

    /* LEGAL MODALS */
    (pf.ai_terms ?
      '<div class="mo" id="tm" onclick="if(event.target===this)this.classList.remove(\'show\')">' +
        '<div class="mb"><button class="mc" onclick="document.getElementById(\'tm\').classList.remove(\'show\')">✕</button><h2>Terms &amp; Conditions</h2><p>' + esc(pf.ai_terms) + '</p></div>' +
      '</div>' : '') +
    (pf.ai_privacy ?
      '<div class="mo" id="pm" onclick="if(event.target===this)this.classList.remove(\'show\')">' +
        '<div class="mb"><button class="mc" onclick="document.getElementById(\'pm\').classList.remove(\'show\')">✕</button><h2>Privacy Policy</h2><p>' + esc(pf.ai_privacy) + '</p></div>' +
      '</div>' : '') +

    /* SCRIPTS */
    '<script>' +

    /* Hero slideshow */
    (heroImgs.length > 1 ?
      'var _slides=document.querySelectorAll(".hero-slide");' +
      'var _hdots=document.querySelectorAll(".hero-dot");' +
      'var _si=0,_stimer=null;' +
      'function slideTo(n){' +
        'if(_slides[_si])_slides[_si].classList.remove("active");' +
        'if(_hdots[_si])_hdots[_si].classList.remove("active");' +
        '_si=n;' +
        'if(_slides[_si])_slides[_si].classList.add("active");' +
        'if(_hdots[_si])_hdots[_si].classList.add("active");' +
      '}' +
      'function _slideNext(){slideTo((_si+1)%' + heroImgs.length + ');}' +
      '_stimer=setInterval(_slideNext,4500);' +
      'var _heroEl=document.getElementById("home");' +
      'if(_heroEl){' +
        '_heroEl.addEventListener("mouseenter",function(){clearInterval(_stimer);});' +
        '_heroEl.addEventListener("mouseleave",function(){_stimer=setInterval(_slideNext,4500);});' +
      '}' : '') +

    /* Page routing */
    'var _activePage="page-home";' +
    'function showPage(id){' +
      'var old=document.getElementById(_activePage);' +
      'var next=document.getElementById(id);' +
      'if(!next)return;' +
      'if(old)old.classList.remove("active");' +
      'next.classList.add("active");' +
      '_activePage=id;' +
      'document.querySelectorAll(".nav-link,.mnav-link").forEach(function(a){' +
        'a.classList.toggle("active",a.getAttribute("onclick")&&a.getAttribute("onclick").indexOf(id)>-1);' +
      '});' +
      'window.scrollTo(0,0);' +
    '}' +

    /* Mobile nav */
    'function openMnav(){document.getElementById("mnavOverlay").classList.add("open")}' +
    'function closeMnav(){document.getElementById("mnavOverlay").classList.remove("open")}' +

    /* Gallery flip-page */
    'var _fpIdx=0,_fpTotal=' + totalFlipPages + ',_fpFlipping=false;' +
    'function fpGoto(i){' +
      'if(_fpFlipping||i===_fpIdx)return;' +
      '_fpFlipping=true;' +
      'var dir=i>_fpIdx?1:-1;' +
      'var steps=Math.abs(i-_fpIdx);' +
      'function flipOne(){' +
        'if(steps--<=0){_fpFlipping=false;return;}' +
        'var cur=_fpIdx;' +
        'var pg=document.getElementById("fpPage"+cur);' +
        'if(dir>0){' +
          'if(pg){pg.classList.add("flipped");pg.style.zIndex=(_fpTotal-cur);}' +
          '_fpIdx++;' +
        '}else{' +
          '_fpIdx--;' +
          'var pg2=document.getElementById("fpPage"+_fpIdx);' +
          'if(pg2){pg2.classList.remove("flipped");pg2.style.zIndex=(_fpTotal-_fpIdx);}' +
        '}' +
        'document.querySelectorAll(".fp-dot").forEach(function(d,j){d.classList.toggle("active",j===_fpIdx)});' +
        'var pb=document.getElementById("fpBtnPrev");var nb=document.getElementById("fpBtnNext");' +
        'if(pb)pb.disabled=_fpIdx===0;if(nb)nb.disabled=_fpIdx>=_fpTotal-1;' +
        'if(steps>0)setTimeout(flipOne,120);else setTimeout(function(){_fpFlipping=false;},700);' +
      '}' +
      'flipOne();' +
    '}' +
    'function fpStep(d){fpGoto(Math.max(0,Math.min(_fpIdx+d,_fpTotal-1)));}' +
    'document.addEventListener("keydown",function(e){if(_activePage==="page-gallery"){if(e.key==="ArrowLeft")fpStep(-1);if(e.key==="ArrowRight")fpStep(1);}});' +
    'document.querySelectorAll(".fp-btn-prev").forEach(function(b){b.id="fpBtnPrev";b.disabled=true});' +
    'document.querySelectorAll(".fp-btn-next").forEach(function(b){b.id="fpBtnNext"});' +
    'var _fpTx=0;var fpBook=document.getElementById("fpBook");var fpWrap=fpBook?fpBook.parentElement:null;' +
    'if(fpWrap){' +
      'fpWrap.addEventListener("touchstart",function(e){_fpTx=e.touches[0].clientX;},{passive:true});' +
      'fpWrap.addEventListener("touchend",function(e){var dx=e.changedTouches[0].clientX-_fpTx;if(Math.abs(dx)>50)fpStep(dx<0?1:-1);});' +
      'fpWrap.addEventListener("click",function(e){var r=fpWrap.getBoundingClientRect();if(e.clientX-r.left>r.width/2)fpStep(1);else fpStep(-1);});' +
    '}' +

    /* Intersection observer for animations */
    'var _obs=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting)x.target.classList.add("fu")});},{threshold:0.1});' +
    'document.querySelectorAll(".card,.social-link,.stat").forEach(function(el){_obs.observe(el)});' +
    '<\/script>' +
    '</body></html>'
  );
  document.close();
}

loadPortfolio();
</script>
