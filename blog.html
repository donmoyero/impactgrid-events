<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Impact Grid Group</title>
  <meta name="description" content="Stories, updates and behind-the-scenes from Impact Grid Group — Manchester." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KVJC5DE2WT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-KVJC5DE2WT');
  </script>

  <style>
    :root { --pf: 'Fraunces', Georgia, serif; }

    /* ═══════════════════════════════════════
       SHELF — grid of closed books (cover page)
    ═══════════════════════════════════════ */
    .blog-page { padding: 80px 24px 100px; }
    .blog-label {
      font-family: var(--fm); font-size: 10px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text); text-align: center; margin-bottom: 16px;
    }
    .blog-title {
      font-family: var(--fb); font-size: clamp(36px, 4.5vw, 64px);
      font-weight: 900; line-height: 1.04; letter-spacing: -0.03em;
      color: var(--text); text-align: center; margin-bottom: 64px;
    }

    .shelf {
      max-width: var(--max-w); margin: 0 auto;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 36px 28px; align-items: end;
    }
    .shelf::before { content: none; }

    .closed-book {
      position: relative;
      aspect-ratio: 2 / 3;
      border-radius: 4px 8px 8px 4px;
      cursor: pointer;
      transform-style: preserve-3d;
      perspective: 1200px;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .closed-book:hover { transform: translateY(-6px) rotate(-1deg); }
    .closed-book.disabled { cursor: default; }
    .closed-book.disabled:hover { transform: none; }

    .closed-book-cover {
      position: absolute; inset: 0;
      border-radius: 4px 8px 8px 4px;
      background: linear-gradient(135deg, #1d1812 0%, #100d09 100%);
      box-shadow:
        -4px 0 0 rgba(0,0,0,0.35) inset,
        6px 10px 28px rgba(0,0,0,0.35);
      overflow: hidden;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .closed-book-cover img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; opacity: 0.78;
    }
    .closed-book-cover::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.15) 55%, transparent 80%);
    }
    .closed-book-spine {
      position: absolute; top: 0; left: 0; bottom: 0; width: 10px;
      background: linear-gradient(to right, rgba(0,0,0,0.5), rgba(255,255,255,0.05));
      z-index: 2;
    }
    .closed-book-info {
      position: relative; z-index: 1;
      padding: 16px 16px 18px;
    }
    .closed-book-tag {
      font-family: var(--fm); font-size: 8.5px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.55); margin-bottom: 6px;
    }
    .closed-book-title {
      font-family: var(--pf); font-size: 16px; font-weight: 400;
      line-height: 1.25; color: #fff;
    }
    .closed-book-pagecount {
      font-family: var(--fm); font-size: 9px; color: rgba(255,255,255,0.45);
      margin-top: 6px;
    }

    /* Empty-state placeholder book */
    .closed-book.placeholder .closed-book-cover {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    }
    .closed-book.placeholder .closed-book-cover::after { background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 70%); }
    .closed-book.placeholder .closed-book-title { font-size: 19px; }

    .shelf-board {
      grid-column: 1 / -1;
      height: 14px; margin-top: -10px;
      background: linear-gradient(to bottom, #c9b896, #a8966e);
      border-radius: 2px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.18);
      display: none;
    }

    /* ═══════════════════════════════════════
       POST VIEW — full blog article (replaces the page-flip book)
    ═══════════════════════════════════════ */
    .post-view {
      position: fixed; inset: 0; z-index: 2000;
      background: #fff; overflow-y: auto;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .post-view.show { opacity: 1; pointer-events: auto; }

    .post-close {
      position: fixed; top: 22px; right: 26px; z-index: 2010;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(20,16,10,0.06); border: 1px solid rgba(20,16,10,0.14);
      color: var(--text); font-size: 18px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s;
    }
    .post-close:hover { background: rgba(20,16,10,0.12); }

    .post-hero { width: 100%; max-height: 48vh; object-fit: cover; display: block; }

    .post-header { max-width: 720px; margin: 0 auto; padding: 48px 24px 0; text-align: center; }
    .post-tag {
      font-family: var(--fm); font-size: 10px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: rgba(40,32,18,0.55); margin-bottom: 10px;
    }
    .post-title {
      font-family: var(--fb); font-size: clamp(28px, 4vw, 46px); font-weight: 900;
      line-height: 1.1; letter-spacing: -0.02em; color: var(--text);
    }

    .post-body { max-width: 720px; margin: 0 auto; padding: 40px 24px 140px; display: flex; flex-direction: column; gap: 40px; }

    .post-block { position: relative; }
    .post-block-text .pb-heading { font-family: var(--pf); font-size: clamp(19px, 2.4vw, 26px); color: #2a2419; margin-bottom: 14px; line-height: 1.3; }
    .post-block-text .pb-body { font-family: var(--fb); font-size: 16px; line-height: 1.85; color: #4a4234; white-space: pre-wrap; }
    .post-block-image img { width: 100%; border-radius: 10px; display: block; }
    .post-block-youtube { width: 100%; border-radius: 10px; overflow: hidden; background: #000; position: relative; aspect-ratio: 16/9; }
    .post-block-youtube iframe { width: 100%; height: 100%; border: 0; }
    .pby-thumb { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
    .pby-play {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 22px; pointer-events: none;
    }
    .pb-caption { margin-top: 10px; font-family: var(--fm); font-size: 11px; color: rgba(40,32,18,0.55); text-align: center; }

    .post-empty { text-align: center; font-family: var(--fm); font-size: 12px; color: rgba(40,32,18,0.4); padding: 60px 0; }

    /* admin-only controls (shown when logged in) */
    .pb-admin-bar { display: flex; gap: 6px; justify-content: flex-end; margin-bottom: 8px; }
    .pb-admin-btn {
      width: 28px; height: 28px; border-radius: 6px; border: 1px solid rgba(40,32,18,0.15);
      background: rgba(40,32,18,0.04); display: flex; align-items: center; justify-content: center;
      font-size: 12px; cursor: pointer; color: rgba(40,32,18,0.6);
    }
    .pb-admin-btn:hover { background: rgba(40,32,18,0.1); }
    .pb-admin-btn.danger:hover { background: #f3d9d9; color: #a33; }
    .pb-admin-btn[disabled] { opacity: 0.3; cursor: default; }
    .pb-admin-btn[disabled]:hover { background: rgba(40,32,18,0.04); }

    .add-block-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
    .add-block-btn {
      border: 1.5px dashed rgba(40,32,18,0.3); padding: 12px 22px; border-radius: 100px;
      background: transparent; cursor: pointer; font-family: var(--fm); font-size: 11px;
      letter-spacing: 0.08em; text-transform: uppercase; color: rgba(40,32,18,0.6);
      transition: all 0.2s;
    }
    .add-block-btn:hover { border-color: var(--gold); color: var(--text); background: rgba(212,175,100,0.08); }

    /* add / edit modal */
    .block-modal-overlay {
      position: fixed; inset: 0; z-index: 3000; background: rgba(20,16,10,0.5);
      display: flex; align-items: center; justify-content: center; padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .block-modal-overlay.show { opacity: 1; pointer-events: auto; }
    .block-modal { background: #fff; border-radius: 12px; max-width: 480px; width: 100%; padding: 28px; box-shadow: 0 30px 70px rgba(0,0,0,0.3); }
    .block-modal-title { font-family: var(--pf); font-size: 20px; margin-bottom: 18px; color: var(--text); }
    .bm-field { margin-bottom: 14px; }
    .bm-field label { display: block; font-family: var(--fm); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(40,32,18,0.5); margin-bottom: 6px; }
    .bm-field input, .bm-field textarea {
      width: 100%; padding: 10px 12px; border: 1px solid rgba(40,32,18,0.2); border-radius: 6px;
      font-family: var(--fb); font-size: 14px; color: var(--text); box-sizing: border-box;
    }
    .bm-field textarea { min-height: 110px; resize: vertical; }
    .block-modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
    .bm-btn { padding: 9px 18px; border-radius: 100px; font-family: var(--fm); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; border: 1px solid transparent; }
    .bm-cancel { background: transparent; color: rgba(40,32,18,0.6); border: 1px solid rgba(40,32,18,0.2); }
    .bm-save { background: var(--text); color: #fff; }
    .bm-save:hover { opacity: 0.85; }

    @media (max-width: 700px) {
      .blog-page { padding: 56px 14px 80px; }
      .shelf { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 22px 16px; }
      .post-header { padding: 36px 18px 0; }
      .post-body { padding: 30px 18px 100px; gap: 30px; }
    }
  </style>
</head>
<body>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>

  <div id="ig-nav"></div>
  <script src="nav.js"></script>
  <script>renderNav('blog.html');</script>

  <div class="page-wrap">
    <div class="blog-page">
      <div class="blog-label">Stories</div>
      <h1 class="blog-title">ImpactGrid Blog</h1>

      <div class="shelf" id="shelf">
        <!-- closed books injected here -->
      </div>
    </div>
  </div>

  <div id="ig-footer"></div>
  <script>renderFooter();</script>

  <!-- ═══ POST VIEW (full article, opens from the book cover) ═══ -->
  <div class="post-view" id="postView">
    <button class="post-close" id="postCloseBtn" aria-label="Close">✕</button>
    <img class="post-hero" id="postHero" src="" alt="" style="display:none;">
    <div class="post-header">
      <div class="post-tag" id="postTag"></div>
      <h1 class="post-title" id="postTitle"></h1>
    </div>
    <div class="post-body" id="postBody"></div>
  </div>

  <!-- ═══ Add / edit block modal (admin only) ═══ -->
  <div class="block-modal-overlay" id="blockModalOverlay">
    <div class="block-modal">
      <div class="block-modal-title" id="blockModalTitle">Add text</div>
      <div id="blockModalFields"></div>
      <div class="block-modal-actions">
        <button class="bm-btn bm-cancel" id="blockModalCancel">Cancel</button>
        <button class="bm-btn bm-save" id="blockModalSave">Save</button>
      </div>
    </div>
  </div>

  <script>
  /* ════════════════════════════════════════
     BLOG ENGINE
     Data model (Supabase, content project):
       blog_posts  { id, title, cover_image, category, created_at }
       blog_pages  { id, post_id, order, type, heading, body, url, cloudinary_id, video_id, caption }

     The shelf shows closed-book covers (unchanged).
     Clicking a cover opens a normal full-page article view (not a page-flip book),
     listing every page/block in order. Logged-in admins get + Add / move / delete controls.
  ════════════════════════════════════════ */

  var posts = [];          // [{id,title,coverImage,category,pages:[{id,order,type,...}]}]
  var activePost = null;
  var isAdmin = false;

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  /* ── Render the shelf of closed books ── */
  function renderShelf() {
    var shelf = document.getElementById('shelf');
    if (!posts.length) {
      shelf.innerHTML =
        '<div class="closed-book disabled placeholder">' +
          '<div class="closed-book-cover">' +
            '<div class="closed-book-info">' +
              '<div class="closed-book-tag">Coming soon</div>' +
              '<div class="closed-book-title">ImpactGrid Blog</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      return;
    }
    shelf.innerHTML = posts.map(function(p, i) {
      return '<div class="closed-book" data-idx="' + i + '" onclick="openPost(' + i + ')">' +
        '<div class="closed-book-cover">' +
          (p.coverImage ? '<img src="' + esc(p.coverImage) + '" alt="">' : '') +
          '<div class="closed-book-spine"></div>' +
          '<div class="closed-book-info">' +
            '<div class="closed-book-tag">' + esc(p.category || 'Journal') + '</div>' +
            '<div class="closed-book-title">' + esc(p.title) + '</div>' +
            '<div class="closed-book-pagecount">' + (p.pages.length) + ' page' + (p.pages.length === 1 ? '' : 's') + '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  /* ── Open / close the article view ── */
  function openPost(i) {
    activePost = posts[i];
    if (!activePost) return;

    document.getElementById('postTag').textContent = activePost.category || 'Journal';
    document.getElementById('postTitle').textContent = activePost.title;
    var hero = document.getElementById('postHero');
    if (activePost.coverImage) { hero.src = activePost.coverImage; hero.style.display = 'block'; }
    else { hero.style.display = 'none'; }

    renderPostBody();
    document.getElementById('postView').classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closePost() {
    document.getElementById('postView').classList.remove('show');
    document.body.style.overflow = '';
    activePost = null;
  }
  document.getElementById('postCloseBtn').addEventListener('click', closePost);
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape' && activePost) closePost();
  });

  /* ── Build HTML for a single content block ── */
  function blockHTML(pg, idx) {
    var adminBar = isAdmin ? adminBarHTML(idx) : '';
    if (pg.type === 'image') {
      return '<div class="post-block post-block-image">' + adminBar +
        '<img src="' + esc(pg.url) + '" alt="">' +
        (pg.caption ? '<div class="pb-caption">' + esc(pg.caption) + '</div>' : '') +
        '</div>';
    }
    if (pg.type === 'youtube') {
      var vid = esc(pg.videoId || '');
      return '<div class="post-block post-block-youtube-wrap">' + adminBar +
        '<div class="post-block-youtube" data-vid="' + vid + '">' +
          '<img class="pby-thumb" src="https://img.youtube.com/vi/' + vid + '/hqdefault.jpg" alt="" onclick="playYoutube(this)">' +
          '<div class="pby-play" onclick="this.previousElementSibling.click()">▶</div>' +
        '</div>' +
        (pg.caption ? '<div class="pb-caption">' + esc(pg.caption) + '</div>' : '') +
        '</div>';
    }
    // text
    return '<div class="post-block post-block-text">' + adminBar +
      (pg.heading ? '<div class="pb-heading">' + esc(pg.heading) + '</div>' : '') +
      '<div class="pb-body">' + esc(pg.body || '') + '</div>' +
      '</div>';
  }

  function adminBarHTML(idx) {
    var total = activePost.pages.length;
    return '<div class="pb-admin-bar">' +
      '<button class="pb-admin-btn" title="Move up" ' + (idx === 0 ? 'disabled' : '') + ' onclick="moveBlock(' + idx + ',-1)">↑</button>' +
      '<button class="pb-admin-btn" title="Move down" ' + (idx === total - 1 ? 'disabled' : '') + ' onclick="moveBlock(' + idx + ',1)">↓</button>' +
      '<button class="pb-admin-btn danger" title="Delete" onclick="deleteBlock(' + idx + ')">✕</button>' +
      '</div>';
  }

  function renderPostBody() {
    var body = document.getElementById('postBody');
    var pages = activePost.pages;
    var html = pages.length
      ? pages.map(function(pg, idx){ return blockHTML(pg, idx); }).join('')
      : '<div class="post-empty">No content yet.</div>';
    if (isAdmin) {
      html += '<div class="add-block-row">' +
        '<button class="add-block-btn" onclick="openBlockModal(\'text\')">+ Add text</button>' +
        '<button class="add-block-btn" onclick="openBlockModal(\'image\')">+ Add picture</button>' +
        '</div>';
    }
    body.innerHTML = html;
  }

  function playYoutube(imgEl) {
    var wrap = imgEl.parentElement;
    var vid = wrap.getAttribute('data-vid');
    wrap.innerHTML = '<iframe src="https://www.youtube-nocookie.com/embed/' + vid + '?autoplay=1" ' +
      'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>';
  }

  /* ── Admin: reorder blocks (swap order values in Supabase) ── */
  async function moveBlock(idx, dir) {
    if (!isAdmin || !activePost) return;
    var pages = activePost.pages;
    var newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= pages.length) return;

    var a = pages[idx], b = pages[newIdx];
    var aOrder = a.order, bOrder = b.order;
    pages[idx] = b; pages[newIdx] = a;
    renderPostBody();

    try {
      var sb = getContentClient();
      await sb.from('blog_pages').update({ order: bOrder }).eq('id', a.id);
      await sb.from('blog_pages').update({ order: aOrder }).eq('id', b.id);
      a.order = bOrder; b.order = aOrder;
    } catch (e) {
      console.warn('Reorder failed:', e);
    }
  }

  /* ── Admin: delete a block ── */
  async function deleteBlock(idx) {
    if (!isAdmin || !activePost) return;
    var pg = activePost.pages[idx];
    if (!confirm('Delete this section?')) return;
    try {
      var sb = getContentClient();
      var { error } = await sb.from('blog_pages').delete().eq('id', pg.id);
      if (error) throw error;
    } catch (e) {
      console.warn('Delete failed:', e);
      alert('Could not delete — please try again.');
      return;
    }
    activePost.pages.splice(idx, 1);
    renderPostBody();
  }

  /* ── Admin: add a new block ── */
  var pendingBlockType = null;

  function openBlockModal(type) {
    pendingBlockType = type;
    var fields = document.getElementById('blockModalFields');
    document.getElementById('blockModalTitle').textContent = type === 'text' ? 'Add text section' : 'Add picture';
    if (type === 'text') {
      fields.innerHTML =
        '<div class="bm-field"><label>Heading (optional)</label><input id="bmHeading" type="text"></div>' +
        '<div class="bm-field"><label>Text</label><textarea id="bmBody"></textarea></div>';
    } else {
      fields.innerHTML =
        '<div class="bm-field"><label>Image URL</label><input id="bmUrl" type="text" placeholder="https://..."></div>' +
        '<div class="bm-field"><label>Caption (optional)</label><input id="bmCaption" type="text"></div>';
    }
    document.getElementById('blockModalOverlay').classList.add('show');
  }

  function closeBlockModal() {
    document.getElementById('blockModalOverlay').classList.remove('show');
    pendingBlockType = null;
  }
  document.getElementById('blockModalCancel').addEventListener('click', closeBlockModal);
  document.getElementById('blockModalOverlay').addEventListener('click', function(e){
    if (e.target === this) closeBlockModal();
  });

  document.getElementById('blockModalSave').addEventListener('click', async function() {
    if (!pendingBlockType || !activePost || !isAdmin) return;

    var maxOrder = activePost.pages.reduce(function(m, p){ return Math.max(m, p.order || 0); }, -1);
    var row = { post_id: activePost.id, type: pendingBlockType, order: maxOrder + 1 };

    if (pendingBlockType === 'text') {
      row.heading = document.getElementById('bmHeading').value.trim();
      row.body = document.getElementById('bmBody').value.trim();
      if (!row.body) { alert('Please add some text.'); return; }
    } else {
      row.url = document.getElementById('bmUrl').value.trim();
      row.caption = document.getElementById('bmCaption').value.trim();
      if (!row.url) { alert('Please add an image URL.'); return; }
    }

    try {
      var sb = getContentClient();
      var { data, error } = await sb.from('blog_pages').insert(row).select().single();
      if (error) throw error;
      activePost.pages.push({
        id: data.id, order: data.order, type: data.type,
        heading: data.heading || '', body: data.body || '',
        url: data.url || '', cloudinaryId: data.cloudinary_id || '',
        videoId: data.video_id || '', caption: data.caption || ''
      });
      closeBlockModal();
      renderPostBody();
    } catch (e) {
      console.warn('Add block failed:', e);
      alert('Could not save — please try again.');
    }
  });

  /* ── Check whether the current visitor is logged in (admin) ── */
  async function checkAdmin() {
    try {
      var sb = getContentClient();
      var res = await sb.auth.getSession();
      isAdmin = !!(res && res.data && res.data.session);
    } catch (e) {
      isAdmin = false;
    }
  }

  /* ── Load posts from Supabase ── */
  async function loadPosts() {
    try {
      var sb = getContentClient();

      /* Load all posts */
      var { data: postsData, error: postsErr } = await sb
        .from('blog_posts')
        .select('*')
        .order('created_at', { ascending: false });
      if (postsErr) throw postsErr;

      /* Load pages for each post */
      var loaded = [];
      for (var i = 0; i < (postsData || []).length; i++) {
        var p = postsData[i];
        var { data: pagesData, error: pagesErr } = await sb
          .from('blog_pages')
          .select('*')
          .eq('post_id', p.id)
          .order('order', { ascending: true });
        if (pagesErr) throw pagesErr;
        loaded.push({
          id: p.id,
          title: p.title || 'Untitled',
          coverImage: p.cover_image || '',
          category: p.category || '',
          pages: (pagesData || []).map(function(pg) {
            return {
              id: pg.id,
              order: pg.order,
              type: pg.type,
              heading: pg.heading || '',
              body: pg.body || '',
              url: pg.url || '',
              cloudinaryId: pg.cloudinary_id || '',
              videoId: pg.video_id || '',
              caption: pg.caption || ''
            };
          })
        });
      }
      posts = loaded;
    } catch (e) {
      console.warn('Blog Supabase fetch failed:', e);
      posts = [];
    }
    renderShelf();
  }

  async function init() {
    await checkAdmin();
    await loadPosts();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  </script>

</body>
</html>
