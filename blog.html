<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Impact Grid Group</title>
  <meta name="description" content="Stories, updates and behind-the-scenes from Impact Grid Group — Manchester." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KVJC5DE2WT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-KVJC5DE2WT');
  </script>

  <style>
    :root { --pf: 'Fraunces', Georgia, serif; }

    /* ═══════════════════════════════════════
       SHELF — grid of closed books
    ═══════════════════════════════════════ */
    .blog-page { padding: 80px 24px 100px; }
    .blog-label {
      font-family: var(--fm); font-size: 10px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text); text-align: center; margin-bottom: 16px;
    }
    .blog-title {
      font-family: var(--fb); font-size: clamp(36px, 4.5vw, 64px);
      font-weight: 900; line-height: 1.04; letter-spacing: -0.03em;
      color: var(--text); text-align: center; margin-bottom: 64px;
    }

    .shelf {
      max-width: var(--max-w); margin: 0 auto;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 36px 28px; align-items: end;
    }
    .shelf::before { content: none; }

    .closed-book {
      position: relative;
      aspect-ratio: 2 / 3;
      border-radius: 4px 8px 8px 4px;
      cursor: pointer;
      transform-style: preserve-3d;
      perspective: 1200px;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .closed-book:hover { transform: translateY(-6px) rotate(-1deg); }
    .closed-book.disabled { cursor: default; }
    .closed-book.disabled:hover { transform: none; }

    .closed-book-cover {
      position: absolute; inset: 0;
      border-radius: 4px 8px 8px 4px;
      background: linear-gradient(135deg, #1d1812 0%, #100d09 100%);
      box-shadow:
        -4px 0 0 rgba(0,0,0,0.35) inset,
        6px 10px 28px rgba(0,0,0,0.35);
      overflow: hidden;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .closed-book-cover img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; opacity: 0.78;
    }
    .closed-book-cover::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.15) 55%, transparent 80%);
    }
    .closed-book-spine {
      position: absolute; top: 0; left: 0; bottom: 0; width: 10px;
      background: linear-gradient(to right, rgba(0,0,0,0.5), rgba(255,255,255,0.05));
      z-index: 2;
    }
    .closed-book-info {
      position: relative; z-index: 1;
      padding: 16px 16px 18px;
    }
    .closed-book-tag {
      font-family: var(--fm); font-size: 8.5px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.55); margin-bottom: 6px;
    }
    .closed-book-title {
      font-family: var(--pf); font-size: 16px; font-weight: 400;
      line-height: 1.25; color: #fff;
    }
    .closed-book-pagecount {
      font-family: var(--fm); font-size: 9px; color: rgba(255,255,255,0.45);
      margin-top: 6px;
    }

    /* Empty-state placeholder book */
    .closed-book.placeholder .closed-book-cover {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    }
    .closed-book.placeholder .closed-book-cover::after { background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 70%); }
    .closed-book.placeholder .closed-book-title { font-size: 19px; }

    .shelf-board {
      grid-column: 1 / -1;
      height: 14px; margin-top: -10px;
      background: linear-gradient(to bottom, #c9b896, #a8966e);
      border-radius: 2px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.18);
      display: none;
    }

    /* ═══════════════════════════════════════
       BOOK OVERLAY (open viewer)
    ═══════════════════════════════════════ */
    .book-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(10,8,5,0.0);
      display: flex; align-items: center; justify-content: center;
      padding: 40px 20px;
      opacity: 0; pointer-events: none;
      transition: background 0.4s, opacity 0.3s;
    }
    .book-overlay.show {
      background: rgba(10,8,5,0.78);
      opacity: 1; pointer-events: auto;
    }

    .book-close {
      position: absolute; top: 22px; right: 26px; z-index: 60;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s;
    }
    .book-close:hover { background: rgba(255,255,255,0.18); }

    .book-scene { perspective: 2400px; width: min(1300px, 96vw); position: relative; }
    .book-scene::after {
      content: ''; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
      width: 55%; height: 50px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.3) 0%, transparent 70%);
      filter: blur(14px); pointer-events: none;
    }

    .book-root {
      position: relative; width: 100%; aspect-ratio: 2 / 1.15;
      transform-style: preserve-3d;
      transform: rotateY(0deg) scale(1);
      transition: transform 0.6s cubic-bezier(0.34,1.2,0.64,1), opacity 0.4s;
    }

    /* Closed state: a single cover board sits centered, page halves hidden */
    .book-root.is-closed .book-half,
    .book-root.is-closed .book-spine,
    .book-root.is-closed .book-click-left,
    .book-root.is-closed .book-click-right { opacity: 0; pointer-events: none; }
    .book-cover-board {
      position: absolute; inset: 0; left: 25%; width: 50%;
      border-radius: 6px;
      background: linear-gradient(135deg, #1d1812 0%, #100d09 100%);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      display: flex; flex-direction: column; justify-content: flex-end;
      overflow: hidden;
      opacity: 0; pointer-events: none;
      transition: opacity 0.4s;
      cursor: pointer;
    }
    .book-root.is-closed .book-cover-board { opacity: 1; pointer-events: auto; }
    .book-cover-board img {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.8;
    }
    .book-cover-board::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 55%, transparent 80%);
    }
    .book-cover-info { position: relative; z-index: 1; padding: 30px; text-align: center; }
    .book-cover-tag {
      font-family: var(--fm); font-size: 10px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: rgba(255,255,255,0.55); margin-bottom: 10px;
    }
    .book-cover-title {
      font-family: var(--pf); font-size: clamp(20px, 3vw, 32px); color: #fff; line-height: 1.2;
    }
    .book-cover-hint {
      margin-top: 14px; font-family: var(--fm); font-size: 9px; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(255,255,255,0.4);
    }

    .book-half { position: absolute; top: 0; width: 50%; height: 100%; overflow: hidden; transition: opacity 0.3s; }
    .book-half-left  { left: 0;  border-radius: 6px 0 0 6px; box-shadow: -6px 8px 40px rgba(0,0,0,0.45), -2px 0 8px rgba(0,0,0,0.2); background: #f7f2e8; }
    .book-half-right { right: 0; border-radius: 0 6px 6px 0; box-shadow: 6px 8px 40px rgba(0,0,0,0.45), 2px 0 8px rgba(0,0,0,0.2); background: #f7f2e8; }

    /* Page content types */
    .pg-content { position: absolute; inset: 0; display: flex; flex-direction: column; }
    .pg-image { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pg-text { padding: 44px 38px; overflow-y: auto; }
    .pg-text .pg-heading { font-family: var(--pf); font-size: clamp(18px, 2.4vw, 26px); color: #2a2419; margin-bottom: 16px; line-height: 1.25; }
    .pg-text .pg-body { font-family: var(--fb); font-size: 14.5px; line-height: 1.85; color: #4a4234; white-space: pre-wrap; }
    .pg-youtube { width: 100%; height: 100%; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
    .pg-youtube iframe { width: 100%; height: 100%; border: 0; }
    .pg-youtube-thumb { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
    .pg-youtube-play {
      position: absolute; width: 60px; height: 60px; border-radius: 50%;
      background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 20px; cursor: pointer; pointer-events: none;
    }
    .pg-caption {
      position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 18px;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
      font-family: var(--fm); font-size: 10.5px; color: #fff;
    }
    .pg-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #b8ab90; font-family: var(--fm); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; }

    .book-pg-num {
      position: absolute; bottom: 14px; font-family: var(--fm); font-size: 11px;
      color: rgba(60,50,30,0.5); background: rgba(255,255,255,0.5); padding: 3px 10px;
      border-radius: 100px; backdrop-filter: blur(4px); pointer-events: none; z-index: 5;
    }
    .book-half-left .book-pg-num  { left: 18px; }
    .book-half-right .book-pg-num { right: 18px; }

    .book-spine {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 18px; height: 100%; z-index: 50; pointer-events: none;
      background: linear-gradient(to right, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.08) 30%, rgba(255,255,255,0.1) 50%, rgba(0,0,0,0.08) 70%, rgba(0,0,0,0.25) 100%);
    }

    .flip-leaf {
      position: absolute; top: 0; width: 50%; height: 100%;
      transform-style: preserve-3d; transform-origin: left center; z-index: 30; pointer-events: none;
    }
    .flip-leaf-face, .flip-leaf-back { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; overflow: hidden; background: #f7f2e8; }
    .flip-leaf-face { border-radius: 0 4px 4px 0; box-shadow: 6px 0 20px rgba(0,0,0,0.3); }
    .flip-leaf-back { transform: rotateY(180deg); border-radius: 6px 0 0 6px; box-shadow: -6px 0 20px rgba(0,0,0,0.3); }

    .book-click-left, .book-click-right {
      position: absolute; top: 0; width: 50%; height: 100%; z-index: 40; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .book-click-left  { left: 0; }
    .book-click-right { right: 0; }
    .book-arrow {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: rgba(40,32,18,0.6); transition: all 0.2s; opacity: 0;
    }
    .book-click-left:hover .book-arrow, .book-click-right:hover .book-arrow { opacity: 1; background: rgba(0,0,0,0.14); }
    .book-click-left.disabled, .book-click-right.disabled { cursor: default; }
    .book-click-left.disabled .book-arrow, .book-click-right.disabled .book-arrow { display: none; }

    .book-status { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 20px; }
    .book-status-label { font-family: var(--pf); font-size: 14px; font-style: italic; color: rgba(255,255,255,0.7); }
    .book-hint { margin-top: 8px; text-align: center; font-family: var(--fm); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.4); }

    .book-loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.6); font-family: var(--fm); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; z-index: 70; }

    @media (max-width: 700px) {
      .blog-page { padding: 56px 14px 80px; }
      .shelf { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 22px 16px; }
      .pg-text { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>

  <div id="ig-nav"></div>
  <script src="nav.js"></script>
  <script>renderNav('blog.html');</script>

  <div class="page-wrap">
    <div class="blog-page">
      <div class="blog-label">Stories</div>
      <h1 class="blog-title">ImpactGrid Blog</h1>

      <div class="shelf" id="shelf">
        <!-- closed books injected here -->
      </div>
    </div>
  </div>

  <div id="ig-footer"></div>
  <script>renderFooter();</script>

  <!-- ═══ BOOK OVERLAY ═══ -->
  <div class="book-overlay" id="bookOverlay">
    <button class="book-close" id="bookCloseBtn" aria-label="Close book">✕</button>
    <div class="book-scene" id="bookScene">
      <div class="book-root" id="bookRoot">

        <div class="book-loading" id="bookLoading" style="display:none;">Loading…</div>

        <!-- Cover board (closed state) -->
        <div class="book-cover-board" id="bookCoverBoard">
          <img id="bookCoverImg" src="" alt="" style="display:none;">
          <div class="book-cover-info">
            <div class="book-cover-tag" id="bookCoverTag"></div>
            <div class="book-cover-title" id="bookCoverTitle"></div>
            <div class="book-cover-hint" id="bookCoverHint">Click to open</div>
          </div>
        </div>

        <div class="book-half book-half-left" id="bookLeft">
          <div class="pg-content" id="bookLeftContent"></div>
          <div class="book-pg-num" id="bookLeftNum"></div>
        </div>
        <div class="book-half book-half-right" id="bookRight">
          <div class="pg-content" id="bookRightContent"></div>
          <div class="book-pg-num" id="bookRightNum"></div>
        </div>

        <div class="book-spine"></div>

        <div class="flip-leaf" id="flipLeaf" style="display:none;">
          <div class="flip-leaf-face"><div class="pg-content" id="flipFaceContent"></div></div>
          <div class="flip-leaf-back"><div class="pg-content" id="flipBackContent"></div></div>
        </div>

        <div class="book-click-left" id="clickLeft"><div class="book-arrow">←</div></div>
        <div class="book-click-right" id="clickRight"><div class="book-arrow">→</div></div>
      </div>

      <div class="book-status" id="bookStatus" style="display:none;">
        <div class="book-status-label" id="bookStatusLabel"></div>
      </div>
      <div class="book-hint" id="bookHint" style="display:none;">← Flip the pages →</div>
    </div>
  </div>

  <script>
  /* ════════════════════════════════════════
     BLOG BOOK ENGINE
     Data model (Supabase, content project):
       blog_posts  { id, title, cover_image, category, created_at }
       blog_pages  { id, post_id, order, type, heading, body, url, cloudinary_id, video_id, caption }

     Each spread = left page (idx-1) + right page (idx). idx 0 = closed cover.
  ════════════════════════════════════════ */

  var posts = [];          // [{id,title,coverImage,category,pages:[{type,...}]}]
  var activePost = null;
  var spreadIdx = 0;       // 0 = closed; 1 = first open spread (left blank, right = page0)
  var isFlipping = false;
  var isOpen = false;

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  /* ── Render the shelf of closed books ── */
  function renderShelf() {
    var shelf = document.getElementById('shelf');
    if (!posts.length) {
      shelf.innerHTML =
        '<div class="closed-book disabled placeholder">' +
          '<div class="closed-book-cover">' +
            '<div class="closed-book-info">' +
              '<div class="closed-book-tag">Coming soon</div>' +
              '<div class="closed-book-title">ImpactGrid Blog</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      return;
    }
    shelf.innerHTML = posts.map(function(p, i) {
      return '<div class="closed-book" data-idx="' + i + '" onclick="openBook(' + i + ')">' +
        '<div class="closed-book-cover">' +
          (p.coverImage ? '<img src="' + esc(p.coverImage) + '" alt="">' : '') +
          '<div class="closed-book-spine"></div>' +
          '<div class="closed-book-info">' +
            '<div class="closed-book-tag">' + esc(p.category || 'Journal') + '</div>' +
            '<div class="closed-book-title">' + esc(p.title) + '</div>' +
            '<div class="closed-book-pagecount">' + (p.pages.length) + ' page' + (p.pages.length === 1 ? '' : 's') + '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  /* ── Open / close ── */
  function openBook(i) {
    activePost = posts[i];
    if (!activePost) return;
    spreadIdx = 0;
    isOpen = true;

    document.getElementById('bookCoverTag').textContent = activePost.category || 'Journal';
    document.getElementById('bookCoverTitle').textContent = activePost.title;
    var coverImg = document.getElementById('bookCoverImg');
    if (activePost.coverImage) { coverImg.src = activePost.coverImage; coverImg.style.display = 'block'; }
    else { coverImg.style.display = 'none'; }

    document.getElementById('bookOverlay').classList.add('show');
    document.getElementById('bookRoot').classList.add('is-closed');
    document.getElementById('bookStatus').style.display = 'none';
    document.getElementById('bookHint').style.display = 'none';

    // wire the cover board click to open the first spread
    document.getElementById('bookCoverBoard').onclick = function(){ flipOpenFromCover(); };
  }

  function flipOpenFromCover() {
    if (isFlipping) return;
    isFlipping = true;
    document.getElementById('bookRoot').classList.remove('is-closed');
    spreadIdx = 0;
    renderSpread(0);
    document.getElementById('bookStatus').style.display = 'flex';
    document.getElementById('bookHint').style.display = 'block';
    setTimeout(function(){ isFlipping = false; }, 350);
  }

  function closeBook() {
    document.getElementById('bookOverlay').classList.remove('show');
    document.getElementById('bookRoot').classList.add('is-closed');
    isOpen = false;
    activePost = null;
  }
  document.getElementById('bookCloseBtn').addEventListener('click', closeBook);
  document.getElementById('bookOverlay').addEventListener('click', function(e){
    if (e.target === this) closeBook();
  });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape' && isOpen) closeBook();
    if (!isOpen || !activePost) return;
    if (e.key === 'ArrowRight') bookFlip(1);
    if (e.key === 'ArrowLeft')  bookFlip(-1);
  });

  /* ── Build page content HTML for a given page object ── */
  function pageHTML(pg) {
    if (!pg) return '<div class="pg-empty">·</div>';
    if (pg.type === 'image') {
      return '<img class="pg-image" src="' + esc(pg.url) + '" alt="">' +
        (pg.caption ? '<div class="pg-caption">' + esc(pg.caption) + '</div>' : '');
    }
    if (pg.type === 'youtube') {
      var vid = esc(pg.videoId || '');
      return '<div class="pg-youtube" data-vid="' + vid + '">' +
        '<img class="pg-youtube-thumb" src="https://img.youtube.com/vi/' + vid + '/hqdefault.jpg" alt="" onclick="playYoutube(this)">' +
        '<div class="pg-youtube-play" onclick="this.previousElementSibling.click()">▶</div>' +
        '</div>' +
        (pg.caption ? '<div class="pg-caption">' + esc(pg.caption) + '</div>' : '');
    }
    // text
    return '<div class="pg-text">' +
      (pg.heading ? '<div class="pg-heading">' + esc(pg.heading) + '</div>' : '') +
      '<div class="pg-body">' + esc(pg.body || '') + '</div>' +
      '</div>';
  }

  function playYoutube(imgEl) {
    var wrap = imgEl.parentElement;
    var vid = wrap.getAttribute('data-vid');
    wrap.innerHTML = '<iframe src="https://www.youtube-nocookie.com/embed/' + vid + '?autoplay=1" ' +
      'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>';
  }

  /* ── Render the static left/right halves ── */
  function renderSpread(idx) {
    var pages = activePost.pages;
    var total = pages.length;

    var leftPg  = idx === 0 ? null : pages[idx - 1];
    var rightPg = pages[idx] || null;

    document.getElementById('bookLeftContent').innerHTML  = pageHTML(leftPg);
    document.getElementById('bookRightContent').innerHTML = pageHTML(rightPg);
    document.getElementById('bookLeftNum').textContent  = leftPg  ? idx + ' / ' + total : '';
    document.getElementById('bookRightNum').textContent = rightPg ? (idx + 1) + ' / ' + total : '';

    document.getElementById('bookStatusLabel').textContent = activePost.title + ' — page ' + Math.min(idx + 1, total) + ' of ' + total;
    document.getElementById('clickLeft').classList.toggle('disabled', idx <= 0);
    document.getElementById('clickRight').classList.toggle('disabled', idx >= total - 1);
  }

  function bookFlip(dir) {
    if (isFlipping || !activePost) return;
    var total = activePost.pages.length;
    var newIdx = spreadIdx + dir;
    if (newIdx < 0 || newIdx > total - 1) return;
    isFlipping = true;

    var leaf = document.getElementById('flipLeaf');
    var faceC = document.getElementById('flipFaceContent');
    var backC = document.getElementById('flipBackContent');

    if (dir > 0) {
      faceC.innerHTML = pageHTML(activePost.pages[spreadIdx]);
      backC.innerHTML = pageHTML(activePost.pages[newIdx]);
      leaf.style.left = '50%'; leaf.style.transformOrigin = 'left center';
      leaf.style.transform = 'rotateY(0deg)'; leaf.style.display = 'block';
      setTimeout(function(){ leaf.style.transition = 'transform 0.75s cubic-bezier(0.645,0.045,0.355,1)'; leaf.style.transform = 'rotateY(-180deg)'; }, 16);
    } else {
      var curLeftPg = spreadIdx === 0 ? null : activePost.pages[spreadIdx - 1];
      var prevPg    = newIdx === 0 ? null : activePost.pages[newIdx - 1];
      faceC.innerHTML = pageHTML(prevPg);
      backC.innerHTML = pageHTML(curLeftPg);
      leaf.style.left = '0%'; leaf.style.transformOrigin = 'right center';
      leaf.style.transform = 'rotateY(-180deg)'; leaf.style.display = 'block';
      setTimeout(function(){ leaf.style.transition = 'transform 0.75s cubic-bezier(0.645,0.045,0.355,1)'; leaf.style.transform = 'rotateY(0deg)'; }, 16);
    }

    setTimeout(function() {
      spreadIdx = newIdx;
      renderSpread(spreadIdx);
      leaf.style.display = 'none'; leaf.style.transition = ''; leaf.style.transform = '';
      isFlipping = false;
    }, 780);
  }

  document.getElementById('clickLeft').addEventListener('click', function(){ bookFlip(-1); });
  document.getElementById('clickRight').addEventListener('click', function(){ bookFlip(1); });

  var _tx = 0;
  document.getElementById('bookRoot').addEventListener('touchstart', function(e){ _tx = e.touches[0].clientX; }, {passive:true});
  document.getElementById('bookRoot').addEventListener('touchend', function(e){
    if (!isOpen) return;
    var dx = e.changedTouches[0].clientX - _tx;
    if (Math.abs(dx) > 44) bookFlip(dx < 0 ? 1 : -1);
  });

  /* ── Load posts from Supabase ── */
  async function loadPosts() {
    try {
      var sb = getContentClient();

      /* Load all posts */
      var { data: postsData, error: postsErr } = await sb
        .from('blog_posts')
        .select('*')
        .order('created_at', { ascending: false });
      if (postsErr) throw postsErr;

      /* Load pages for each post */
      var loaded = [];
      for (var i = 0; i < (postsData || []).length; i++) {
        var p = postsData[i];
        var { data: pagesData, error: pagesErr } = await sb
          .from('blog_pages')
          .select('*')
          .eq('post_id', p.id)
          .order('order', { ascending: true });
        if (pagesErr) throw pagesErr;
        loaded.push({
          id: p.id,
          title: p.title || 'Untitled',
          coverImage: p.cover_image || '',
          category: p.category || '',
          pages: (pagesData || []).map(function(pg) {
            return {
              type: pg.type,
              heading: pg.heading || '',
              body: pg.body || '',
              url: pg.url || '',
              cloudinaryId: pg.cloudinary_id || '',
              videoId: pg.video_id || '',
              caption: pg.caption || ''
            };
          })
        });
      }
      posts = loaded;
    } catch (e) {
      console.warn('Blog Supabase fetch failed:', e);
      posts = [];
    }
    renderShelf();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadPosts);
  } else {
    loadPosts();
  }
  </script>
