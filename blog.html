<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Impact Grid Group</title>
  <meta name="description" content="Stories, updates and behind-the-scenes from Impact Grid Group — Manchester." />

  <!-- Default Open Graph (overridden per-post by JS) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Impact Grid Group" />
  <meta property="og:title" content="Blog — Impact Grid Group" />
  <meta property="og:description" content="Stories, updates and behind-the-scenes from Impact Grid Group — Manchester." />
  <meta property="og:url" content="https://impactgridgroup.com/blog.html" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KVJC5DE2WT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-KVJC5DE2WT');
  </script>

  <style>
    :root { --pf: 'Fraunces', Georgia, serif; }

    /* ═══════════════════════════════════════
       SHELF — grid of closed books
    ═══════════════════════════════════════ */
    .blog-page { padding: 80px 24px 100px; }
    .blog-label {
      font-family: var(--fm); font-size: 10px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text); text-align: center; margin-bottom: 16px;
    }
    .blog-title {
      font-family: var(--fb); font-size: clamp(36px, 4.5vw, 64px);
      font-weight: 900; line-height: 1.04; letter-spacing: -0.03em;
      color: var(--text); text-align: center; margin-bottom: 36px;
    }

    /* ── Controls: search + filter chips ── */
    .blog-controls {
      max-width: var(--max-w); margin: 0 auto 40px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .search-row {
      display: flex; justify-content: center;
    }
    .search-row input {
      width: 100%; max-width: 420px;
      padding: 10px 16px; border-radius: 24px;
      border: 1.5px solid rgba(var(--ink),0.18);
      font-family: var(--fm); font-size: 13px; color: var(--text);
      background: rgba(var(--surface),0.7);
      outline: none; transition: border-color 0.2s;
    }
    .search-row input::placeholder { color: rgba(var(--ink),0.38); }
    .search-row input:focus { border-color: var(--gold); }

    .filter-row {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    }
    .filter-chip {
      font-family: var(--fm); font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 6px 14px; border-radius: 20px;
      border: 1.5px solid rgba(var(--ink),0.2);
      color: rgba(var(--ink),0.6); background: transparent;
      cursor: pointer; transition: all 0.18s;
    }
    .filter-chip:hover { border-color: var(--gold); color: var(--text); }
    .filter-chip.active {
      background: var(--gold); border-color: var(--gold);
      color: #fff;
    }

    /* ── Skeleton loader ── */
    @keyframes shimmer {
      0% { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton-book {
      aspect-ratio: 2 / 3;
      border-radius: 4px 8px 8px 4px;
      background: linear-gradient(90deg, #e8e4dc 25%, #f0ede6 50%, #e8e4dc 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite;
    }

    /* ── Shelf grid ── */
    .shelf {
      max-width: var(--max-w); margin: 0 auto;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 36px 28px; align-items: end;
    }
    .shelf::before { content: none; }

    .closed-book {
      position: relative;
      aspect-ratio: 2 / 3;
      border-radius: 4px 8px 8px 4px;
      cursor: pointer;
      transform-style: preserve-3d;
      perspective: 1200px;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    }
    .closed-book:hover { transform: translateY(-6px) rotate(-1deg); }
    .closed-book.disabled { cursor: default; }
    .closed-book.disabled:hover { transform: none; }
    .closed-book.hidden-post { display: none; }

    .closed-book-cover {
      position: absolute; inset: 0;
      border-radius: 4px 8px 8px 4px;
      background: linear-gradient(135deg, #1d1812 0%, #100d09 100%);
      box-shadow:
        -4px 0 0 rgba(0,0,0,0.35) inset,
        6px 10px 28px rgba(0,0,0,0.35);
      overflow: hidden;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .closed-book-cover img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; opacity: 0.78;
    }
    .closed-book-cover::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.15) 55%, transparent 80%);
    }
    .closed-book-spine {
      position: absolute; top: 0; left: 0; bottom: 0; width: 10px;
      background: linear-gradient(to right, rgba(0,0,0,0.5), rgba(255,255,255,0.05));
      z-index: 2;
    }
    .closed-book-info {
      position: relative; z-index: 1;
      padding: 16px 16px 18px;
    }
    .closed-book-tag {
      font-family: var(--fm); font-size: 8.5px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,255,255,0.55); margin-bottom: 6px;
    }
    .closed-book-title {
      font-family: var(--pf); font-size: 16px; font-weight: 400;
      line-height: 1.25; color: #fff;
    }
    .closed-book-meta {
      font-family: var(--fm); font-size: 9px; color: rgba(255,255,255,0.45);
      margin-top: 6px;
    }

    /* Empty/placeholder book */
    .closed-book.placeholder .closed-book-cover {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
    }
    .closed-book.placeholder .closed-book-cover::after { background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 70%); }
    .closed-book.placeholder .closed-book-title { font-size: 19px; }

    /* ── No-results message ── */
    .shelf-empty-msg {
      grid-column: 1 / -1;
      text-align: center;
      font-family: var(--fm); font-size: 12px; color: rgba(var(--ink),0.4);
      padding: 40px 0;
    }

    /* ═══════════════════════════════════════
       POST VIEW — full article
    ═══════════════════════════════════════ */
    .post-view {
      position: fixed; inset: 0; z-index: 2000;
      background: #fff; overflow-y: auto;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .post-view.show { opacity: 1; pointer-events: auto; }

    /* ── Reading progress bar ── */
    .read-progress {
      position: sticky; top: 0; left: 0; right: 0; z-index: 2020;
      height: 3px; margin-bottom: -3px; background: transparent; pointer-events: none;
      display: none;
    }
    .read-progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--gold, #b8964a), var(--gold2, #d4af6a));
      transition: width 0.08s linear;
      border-radius: 0 2px 2px 0;
    }
    .post-view.show .read-progress { display: block; }

    /* Top nav bar inside post */
    .post-topbar {
      position: sticky; top: 0; left: 0; right: 0; z-index: 2010;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      background: rgba(var(--surface),0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(var(--ink),0.08);
    }
    .post-back {
      font-family: var(--fm); font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(var(--ink),0.65); text-decoration: none;
      display: flex; align-items: center; gap: 6px;
      transition: color 0.2s; cursor: pointer; border: none; background: none;
      padding: 6px 10px; border-radius: 6px;
    }
    .post-back:hover { color: var(--text); background: rgba(var(--ink),0.06); }
    .post-topbar-right { display: flex; align-items: center; gap: 8px; }

    .share-btn {
      font-family: var(--fm); font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 6px 14px; border-radius: 20px;
      border: 1.5px solid rgba(var(--ink),0.2);
      color: rgba(var(--ink),0.65); background: transparent;
      cursor: pointer; transition: all 0.18s; display: flex; align-items: center; gap: 6px;
    }
    .share-btn:hover { border-color: var(--gold); color: var(--text); }
    .share-btn.copied { border-color: #3a8c5c; color: #3a8c5c; }

    .post-close {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(var(--ink),0.06); border: 1px solid rgba(var(--ink),0.14);
      color: var(--text); font-size: 16px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s; flex-shrink: 0;
    }
    .post-close:hover { background: rgba(var(--ink),0.12); }

    /* ── Hero: image + title overlaid ── */
    .post-hero-wrap {
      position: relative;
      width: 100%;
      height: 520px;
      margin-top: 64px; /* clear topbar */
      overflow: hidden;
      background: #1a1612;
    }
    .post-hero {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 20%; /* portrait/Instagram images — slightly above centre keeps faces in frame */
      display: block;
      opacity: 0.82;
      cursor: zoom-in;
      transition: opacity 0.2s;
    }
    .post-hero:hover { opacity: 0.9; }

    /* Dark gradient so text is always readable over any photo */
    .post-hero-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(
        to top,
        rgba(10,8,5,0.88) 0%,
        rgba(10,8,5,0.45) 45%,
        rgba(10,8,5,0.08) 75%,
        transparent 100%
      );
      pointer-events: none;
    }

    /* Title/meta sitting in the bottom-left of the hero */
    .post-header {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 2;
      padding: 0 40px 36px;
      max-width: none;
      text-align: left;
    }
    .post-tag {
      font-family: var(--fm); font-size: 9px; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 10px;
    }
    .post-title {
      font-family: var(--fb); font-size: clamp(24px, 3.5vw, 42px); font-weight: 900;
      line-height: 1.08; letter-spacing: -0.02em; color: #fff;
      max-width: 680px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    /* Reading time + date meta */
    .post-meta {
      margin-top: 12px;
      font-family: var(--fm); font-size: 10px; color: rgba(255,255,255,0.5);
      letter-spacing: 0.04em;
      display: flex; align-items: center; gap: 8px;
    }
    .post-meta-dot { opacity: 0.4; }

    /* No-image fallback: plain dark header */
    .post-hero-wrap.no-image {
      height: auto;
      background: #1a1612;
      padding: 80px 0 0;
    }
    .post-hero-wrap.no-image::after { display: none; }
    .post-hero-wrap.no-image .post-header {
      position: relative;
      padding: 36px 40px 40px;
    }
    .post-hero-wrap.no-image .post-tag { color: rgba(255,255,255,0.5); }

    @media (max-width: 700px) {
      .post-hero-wrap { height: 400px; }
      .post-header { padding: 0 20px 28px; }
      .post-hero-wrap.no-image .post-header { padding: 28px 20px 32px; }
    }

    .post-body { max-width: 720px; margin: 0 auto; padding: 48px 24px 0; display: flex; flex-direction: column; gap: 40px; }
    .post-ad-slot { max-width: 720px; margin: 0 auto; padding: 0 24px; }
    .post-ad-slot:empty { display: none; }

    .post-block { position: relative; }

    /* Drop cap on first text block */
    .post-block-text.first-text .pb-body::first-letter {
      font-family: var(--pf); font-size: 4.2em; font-weight: 400; font-style: italic;
      float: left; line-height: 0.78; margin: 0.06em 0.1em 0 0;
      color: var(--gold, #b8964a);
    }

    .post-block-text .pb-heading { font-family: var(--pf); font-size: clamp(19px, 2.4vw, 26px); color: var(--text); margin-bottom: 14px; line-height: 1.3; }
    .post-block-text .pb-body { font-family: var(--fb); font-size: 16px; line-height: 1.85; color: var(--text2, #4a4234); white-space: pre-wrap; }
    .post-block-image img { width: 100%; border-radius: 10px; display: block; cursor: zoom-in; }
    .post-block-youtube { width: 100%; border-radius: 10px; overflow: hidden; background: #000; position: relative; aspect-ratio: 16/9; }
    .post-block-youtube iframe { width: 100%; height: 100%; border: 0; }
    .pby-thumb { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
    .pby-play {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 22px; pointer-events: none;
    }
    .pby-fallback {
      position: absolute; inset: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #cf2030 0%, #8a0f1c 100%);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.5); font-size: 13px;
      font-family: var(--fm); letter-spacing: 0.08em; text-transform: uppercase;
    }
    .pb-caption { margin-top: 10px; font-family: var(--fm); font-size: 11px; color: rgba(var(--ink),0.55); text-align: center; }

    .post-empty { text-align: center; font-family: var(--fm); font-size: 12px; color: rgba(var(--ink),0.4); padding: 60px 0; }

    /* ── Scroll-reveal ── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    .reveal.in-view { opacity: 1; transform: none; }
    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity: 1; transform: none; }
    }

    /* ── Related posts ── */
    .related-section {
      max-width: 720px; margin: 60px auto 0; padding: 0 24px;
      border-top: 1px solid var(--border, rgba(var(--ink),0.1)); padding-top: 48px;
    }
    .related-heading {
      font-family: var(--fm); font-size: 10px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text3, rgba(var(--ink),0.45)); margin-bottom: 24px;
    }
    .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
    .related-card {
      cursor: pointer; border-radius: 8px; overflow: hidden;
      background: var(--bg2, #f7f4ef);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .related-card:hover { transform: translateY(-4px); }
    .related-card-img {
      width: 100%; aspect-ratio: 3/2; object-fit: cover; display: block;
      background: var(--bg3, #e8e4dc);
    }
    .related-card-info { padding: 12px 14px 14px; }
    .related-card-tag {
      font-family: var(--fm); font-size: 8px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text3, rgba(var(--ink),0.45)); margin-bottom: 5px;
    }
    .related-card-title {
      font-family: var(--pf); font-size: 14px; line-height: 1.3; color: var(--text);
    }

    /* ── End-of-post CTA ── */
    .post-cta {
      max-width: 720px; margin: 48px auto 80px; padding: 0 24px;
    }
    .post-cta-inner {
      background: linear-gradient(135deg, #1d1812 0%, #2e2518 100%);
      border-radius: 14px; padding: 44px 36px; text-align: center;
      position: relative; overflow: hidden;
    }
    .post-cta-inner::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(184,150,74,0.18) 0%, transparent 60%);
    }
    .post-cta-label {
      font-family: var(--fm); font-size: 9px; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gold, #b8964a); margin-bottom: 12px; position: relative;
    }
    .post-cta-heading {
      font-family: var(--fb); font-size: clamp(20px, 3vw, 28px); font-weight: 900;
      line-height: 1.1; letter-spacing: -0.02em;
      color: #fff; margin-bottom: 22px; position: relative;
    }
    .post-cta-btn {
      display: inline-block;
      font-family: var(--fm); font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 13px 28px; border-radius: 28px;
      background: var(--gold, #b8964a); color: #fff;
      text-decoration: none; border: none; cursor: pointer;
      transition: opacity 0.2s; position: relative;
    }
    .post-cta-btn:hover { opacity: 0.88; }

    /* ── Comments ── */
    .comment-section {
      max-width: 720px; margin: 56px auto 0; padding: 48px 24px 0;
      border-top: 1px solid var(--border, rgba(var(--ink),0.1));
    }
    .comment-heading {
      font-family: var(--fm); font-size: 10px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text3, rgba(var(--ink),0.45)); margin-bottom: 22px;
    }
    .comment-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 28px; }
    .comment-item { background: var(--bg2, #f7f4ef); border-radius: 10px; padding: 16px 18px; }
    .comment-item-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .comment-author { font-family: var(--fm); font-size: 11px; font-weight: 700; color: var(--text); }
    .comment-date { font-family: var(--fm); font-size: 9px; color: var(--text3, rgba(var(--ink),0.4)); }
    .comment-body { font-family: var(--pf); font-size: 14px; line-height: 1.55; color: var(--text2, var(--text)); white-space: pre-wrap; }
    .comment-empty { font-family: var(--pf); font-size: 14px; color: var(--text3, rgba(var(--ink),0.5)); font-style: italic; }
    .comment-form { display: flex; flex-direction: column; gap: 10px; }
    .comment-form input, .comment-form textarea {
      font-family: var(--pf); font-size: 14px; padding: 12px 14px;
      border: 1px solid var(--border2, rgba(var(--ink),0.15)); border-radius: 8px;
      background: var(--card, #fff); color: var(--text); resize: vertical;
    }
    .comment-form input:focus, .comment-form textarea:focus { outline: none; border-color: var(--gold); }
    .comment-submit-btn {
      align-self: flex-start;
      font-family: var(--fm); font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 11px 24px; border-radius: 24px;
      background: var(--gold, #b8964a); color: #fff;
      border: none; cursor: pointer; transition: opacity 0.2s;
    }
    .comment-submit-btn:hover { opacity: 0.88; }
    .comment-submit-btn:disabled { opacity: 0.5; cursor: default; }
    .comment-status { font-family: var(--fm); font-size: 10px; color: rgba(var(--ink),0.5); }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed; inset: 0; z-index: 3000;
      background: rgba(0,0,0,0.92);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.22s;
    }
    .lightbox.show { opacity: 1; pointer-events: auto; }
    .lightbox img {
      max-width: 90vw; max-height: 90vh;
      object-fit: contain; border-radius: 6px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.6);
    }
    .lightbox-close {
      position: fixed; top: 20px; right: 24px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; font-size: 18px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.22); }

    @media (max-width: 700px) {
      .blog-page { padding: 56px 14px 80px; }
      .shelf { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 22px 16px; }
      .post-header { padding: 36px 18px 0; }
      .post-body { padding: 30px 18px 0; gap: 30px; }
      .post-cta-inner { padding: 32px 22px; }
      .related-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
      .post-topbar { padding: 10px 14px; }
    }
  </style>
</head>
<body>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="plan-config.js"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>

  <div id="ig-nav"></div>
  <script src="nav.js"></script>
  <script>renderNav('blog.html');</script>

  <div class="page-wrap">
    <div class="blog-page">
      <div class="blog-label">Stories</div>
      <h1 class="blog-title">ImpactGrid Blog</h1>

      <!-- Search + filter controls -->
      <div class="blog-controls">
        <div class="search-row">
          <input type="search" id="blogSearch" placeholder="Search posts…" autocomplete="off" />
        </div>
        <div class="filter-row" id="filterRow">
          <!-- filter chips injected by JS -->
        </div>
      </div>

      <div class="shelf" id="shelf">
        <!-- skeleton loaders shown while fetching -->
        <div class="skeleton-book"></div>
        <div class="skeleton-book"></div>
        <div class="skeleton-book"></div>
        <div class="skeleton-book"></div>
      </div>
    </div>
  </div>

  <div id="ig-footer"></div>
  <script>renderFooter();</script>

  <!-- POST VIEW -->
  <div class="post-view" id="postView">
    <!-- Reading progress bar -->
    <div class="read-progress" id="readProgress">
      <div class="read-progress-fill" id="readProgressFill"></div>
    </div>
    <div class="post-topbar">
      <button class="post-back" id="postBackBtn" aria-label="Back to all posts">
        ← All stories
      </button>
      <div class="post-topbar-right">
        <button class="share-btn" id="shareBtn" aria-label="Copy link">
          <span id="shareBtnIcon">⎘</span>
          <span id="shareBtnLabel">Copy link</span>
        </button>
        <button class="post-close" id="postCloseBtn" aria-label="Close">✕</button>
      </div>
    </div>

    <!-- Hero: image + overlaid title/meta -->
    <div class="post-hero-wrap no-image" id="postHeroWrap">
      <img class="post-hero" id="postHero" src="" alt="" style="display:none;">
      <div class="post-header">
        <div class="post-tag" id="postTag"></div>
        <h1 class="post-title" id="postTitle"></h1>
        <div class="post-meta" id="postMeta">
          <span id="postDate"></span>
          <span class="post-meta-dot" id="postMetaDot" style="display:none">·</span>
          <span id="postReadTime"></span>
          <span class="post-meta-dot" id="postMetaDot2" style="display:none">·</span>
          <span id="postViewCount"></span>
        </div>
      </div>
    </div>

    <div class="post-body" id="postBody"></div>

    <!-- Infolinks ad — script is injected dynamically only when a post is opened -->
    <div class="post-ad-slot" id="postAdSlot"></div>

    <!-- Related posts -->
    <div class="related-section" id="relatedSection" style="display:none">
      <div class="related-heading">More stories</div>
      <div class="related-grid" id="relatedGrid"></div>
    </div>

    <!-- Comments -->
    <div class="comment-section" id="commentSection">
      <div class="comment-heading">Comments (<span id="commentCount">0</span>)</div>
      <div class="comment-list" id="commentList"></div>
      <form class="comment-form" id="commentForm">
        <input type="text" id="commentName" placeholder="Your name" maxlength="60" required>
        <textarea id="commentBody" placeholder="Share your thoughts…" rows="3" maxlength="1000" required></textarea>
        <button type="submit" class="comment-submit-btn" id="commentSubmitBtn">Post comment</button>
        <span class="comment-status" id="commentStatus"></span>

    <div class="post-cta">
      <div class="post-cta-inner">
        <div class="post-cta-label">Work with us</div>
        <div class="post-cta-heading">Ready to make an impact?</div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">✕</button>
    <img id="lightboxImg" src="" alt="" />
  </div>

  <script>
  /* ════════════════════════════════════════
     BLOG ENGINE (enhanced)
     blog_posts  { id, title, cover_image, category, created_at }
     blog_pages  { id, post_id, order, type, heading, body, url, cloudinary_id, video_id, caption }
  ════════════════════════════════════════ */

  var posts = [];
  var activePost = null;
  var activePostIdx = -1;
  var activeFilter = 'All';
  var searchQuery = '';

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function extractYoutubeId(raw) {
    raw = String(raw || '').trim();
    if (!raw) return '';
    if (/^[a-zA-Z0-9_-]{10,12}$/.test(raw)) return raw;
    var patterns = [
      /[?&]v=([a-zA-Z0-9_-]{10,12})/,
      /youtu\.be\/([a-zA-Z0-9_-]{10,12})/,
      /embed\/([a-zA-Z0-9_-]{10,12})/,
      /shorts\/([a-zA-Z0-9_-]{10,12})/
    ];
    for (var i = 0; i < patterns.length; i++) {
      var m = raw.match(patterns[i]);
      if (m) return m[1];
    }
    return raw;
  }

  function ytThumbError(imgEl, vid) {
    var chain = ['hqdefault', 'mqdefault', 'default'];
    var tier = parseInt(imgEl.getAttribute('data-tier') || '0', 10);
    var next = tier + 1;
    if (next < chain.length) {
      imgEl.setAttribute('data-tier', String(next));
      imgEl.src = 'https://img.youtube.com/vi/' + vid + '/' + chain[next] + '.jpg';
    } else {
      imgEl.onerror = null;
      imgEl.style.display = 'none';
      var wrap = imgEl.parentElement;
      if (wrap && !wrap.querySelector('.pby-fallback')) {
        var ph = document.createElement('div');
        ph.className = 'pby-fallback';
        ph.textContent = 'Video';
        wrap.insertBefore(ph, imgEl);
      }
    }
  }

  /* ── Reading time estimator ── */
  function estimateReadTime(pages) {
    var words = 0;
    (pages || []).forEach(function(pg) {
      if (pg.heading) words += pg.heading.split(/\s+/).length;
      if (pg.body) words += pg.body.split(/\s+/).length;
    });
    var mins = Math.max(1, Math.round(words / 200));
    return mins + ' min read';
  }

  /* ── Date formatter ── */
  function formatDate(iso) {
    if (!iso) return '';
    try {
      return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
    } catch(e) { return ''; }
  }

  /* ── Slug for URL ── */
  function slugify(title) {
    return String(title || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  /* ── URL routing ── */
  function pushPostState(post) {
    var slug = slugify(post.title);
    history.pushState({ postSlug: slug }, '', '?post=' + encodeURIComponent(slug));
    // Update OG tags best-effort (helps for re-sharing after navigation)
    document.title = post.title + ' — Impact Grid Group';
  }

  function clearPostState() {
    history.pushState({}, '', 'blog.html');
    document.title = 'Blog — Impact Grid Group';
  }

  function checkUrlPost() {
    var params = new URLSearchParams(window.location.search);
    var slug = params.get('post');
    if (!slug || !posts.length) return;
    for (var i = 0; i < posts.length; i++) {
      if (slugify(posts[i].title) === slug) {
        openPost(i);
        return;
      }
    }
  }

  window.addEventListener('popstate', function(e) {
    if (e.state && e.state.postSlug) {
      // opening from history is fine — checkUrlPost handles it
    } else {
      // navigated back past a post
      if (activePost) {
        _closePost(false);
      }
    }
  });

  /* ── Filter / search ── */
  function getCategories() {
    var cats = {};
    posts.forEach(function(p) { cats[p.category || 'Journal'] = true; });
    return Object.keys(cats).sort();
  }

  function renderFilterChips() {
    var row = document.getElementById('filterRow');
    var cats = getCategories();
    if (cats.length <= 1) { row.style.display = 'none'; return; }
    var all = ['All'].concat(cats);
    row.innerHTML = all.map(function(c) {
      return '<button class="filter-chip' + (c === activeFilter ? ' active' : '') + '" data-cat="' + esc(c) + '">' + esc(c) + '</button>';
    }).join('');
    row.querySelectorAll('.filter-chip').forEach(function(btn) {
      btn.addEventListener('click', function() {
        activeFilter = this.getAttribute('data-cat');
        renderFilterChips();
        filterShelf();
      });
    });
  }

  function filterShelf() {
    var books = document.querySelectorAll('.closed-book:not(.placeholder)');
    var q = searchQuery.toLowerCase();
    var anyVisible = false;
    books.forEach(function(book) {
      var idx = parseInt(book.getAttribute('data-idx'), 10);
      var p = posts[idx];
      if (!p) return;
      var catMatch = activeFilter === 'All' || (p.category || 'Journal') === activeFilter;
      var searchMatch = !q || p.title.toLowerCase().includes(q) || (p.category || '').toLowerCase().includes(q);
      if (catMatch && searchMatch) {
        book.classList.remove('hidden-post');
        anyVisible = true;
      } else {
        book.classList.add('hidden-post');
      }
    });
    // Show empty message if nothing matches
    var existing = document.querySelector('.shelf-empty-msg');
    if (!anyVisible) {
      if (!existing) {
        var msg = document.createElement('div');
        msg.className = 'shelf-empty-msg';
        msg.textContent = 'No posts match your search.';
        document.getElementById('shelf').appendChild(msg);
      }
    } else {
      if (existing) existing.remove();
    }
  }

  document.getElementById('blogSearch').addEventListener('input', function() {
    searchQuery = this.value.trim();
    filterShelf();
  });

  /* ── Render shelf ── */
  function renderShelf() {
    var shelf = document.getElementById('shelf');
    if (!posts.length) {
      shelf.innerHTML =
        '<div class="closed-book disabled placeholder">' +
          '<div class="closed-book-cover">' +
            '<div class="closed-book-info">' +
              '<div class="closed-book-tag">Coming soon</div>' +
              '<div class="closed-book-title">ImpactGrid Blog</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      return;
    }
    shelf.innerHTML = posts.map(function(p, i) {
      return '<div class="closed-book" data-idx="' + i + '" onclick="openPost(' + i + ')">' +
        '<div class="closed-book-cover">' +
          (p.coverImage ? '<img src="' + esc(p.coverImage) + '" alt="">' : '') +
          '<div class="closed-book-spine"></div>' +
          '<div class="closed-book-info">' +
            '<div class="closed-book-tag">' + esc(p.category || 'Journal') + '</div>' +
            '<div class="closed-book-title">' + esc(p.title) + '</div>' +
            '<div class="closed-book-meta">' + esc(estimateReadTime(p.pages)) + '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    renderFilterChips();
  }

  /* ── View tracking (for admin dashboard only — not shown publicly) ── */
  function getVisitorId() {
    try {
      var id = localStorage.getItem('ig_visitor_id');
      if (!id) {
        id = 'v_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
        localStorage.setItem('ig_visitor_id', id);
      }
      return id;
    } catch (e) { return 'v_anon'; }
  }

  function fetchWithTimeout(url, ms) {
    var ctrl = new AbortController();
    var t = setTimeout(function(){ ctrl.abort(); }, ms || 4000);
    return fetch(url, { signal: ctrl.signal }).finally(function(){ clearTimeout(t); });
  }

  async function lookupGeo() {
    /* Try two free providers in case one is blocked/rate-limited/down. */
    try {
      var r = await fetchWithTimeout('https://ipwho.is/', 4000);
      var g = await r.json();
      if (g && g.success !== false && (g.country || g.city)) {
        return { country: g.country || '', city: g.city || '' };
      }
      console.warn('ig geo: ipwho.is returned no location', g);
    } catch (e1) { console.warn('ig geo: ipwho.is failed', e1); }

    try {
      var r2 = await fetchWithTimeout('https://ipapi.co/json/', 4000);
      var g2 = await r2.json();
      if (g2 && !g2.error) {
        return { country: g2.country_name || '', city: g2.city || '' };
      }
      console.warn('ig geo: ipapi.co returned no location', g2);
    } catch (e2) { console.warn('ig geo: ipapi.co failed', e2); }

    return { country: '', city: '' };
  }

  function trackBlogView(postId) {
    if (!postId) return;
    (async function() {
      try {
        var visitorId = getVisitorId();
        var country = '', city = '';
        var cached = null;
        try { cached = JSON.parse(sessionStorage.getItem('ig_geo') || 'null'); } catch(e) {}
        if (cached && (cached.country || cached.city)) {
          country = cached.country; city = cached.city;
        } else {
          var geo = await lookupGeo();
          country = geo.country; city = geo.city;
          if (country || city) {
            try { sessionStorage.setItem('ig_geo', JSON.stringify({ country: country, city: city })); } catch(e) {}
          }
        }

        var sb = getContentClient();
        var { error: insertErr } = await sb.from('blog_views').insert({
          post_id: postId, visitor_id: visitorId, country: country, city: city
        });
        if (insertErr) console.warn('ig view insert failed:', insertErr);
      } catch (e) { console.warn('View tracking failed:', e); }
    })();
  }

  function loadViewCount(postId) {
    if (!postId) return;
    (async function() {
      try {
        var sb = getContentClient();
        var { count, error } = await sb
          .from('blog_views')
          .select('*', { count: 'exact', head: true })
          .eq('post_id', postId);
        var el = document.getElementById('postViewCount');
        var dot = document.getElementById('postMetaDot2');
        if (error || count == null) { el.textContent = ''; dot.style.display = 'none'; return; }
        el.textContent = count + (count === 1 ? ' view' : ' views');
        dot.style.display = 'inline';
      } catch (e) { console.warn('View count failed:', e); }
    })();
  }

  function loadComments(postId) {
    if (!postId) return;
    var listEl = document.getElementById('commentList');
    var countEl = document.getElementById('commentCount');
    listEl.innerHTML = '<div class="comment-empty">Loading comments…</div>';
    (async function() {
      try {
        var sb = getContentClient();
        var { data, error } = await sb
          .from('blog_comments')
          .select('*')
          .eq('post_id', postId)
          .order('created_at', { ascending: false });
        if (error) throw error;
        countEl.textContent = (data || []).length;
        if (!data || !data.length) {
          listEl.innerHTML = '<div class="comment-empty">No comments yet — be the first to share your thoughts.</div>';
          return;
        }
        listEl.innerHTML = data.map(function(c) {
          return '<div class="comment-item">' +
            '<div class="comment-item-head">' +
              '<span class="comment-author">' + esc(c.name) + '</span>' +
              '<span class="comment-date">' + formatDate(c.created_at) + '</span>' +
            '</div>' +
            '<div class="comment-body">' + esc(c.comment) + '</div>' +
          '</div>';
        }).join('');
      } catch (e) {
        console.warn('Load comments failed:', e);
        listEl.innerHTML = '<div class="comment-empty">Couldn\u2019t load comments right now.</div>';
      }
    })();
  }

  /* ── Open post ── */
  function openPost(i) {
    activePost = posts[i];
    activePostIdx = i;
    if (!activePost) return;

    document.getElementById('postTag').textContent = activePost.category || 'Journal';
    document.getElementById('postTitle').textContent = activePost.title;

    // Meta: date + read time
    var dateStr = formatDate(activePost.createdAt);
    var rtStr = estimateReadTime(activePost.pages);
    document.getElementById('postDate').textContent = dateStr;
    document.getElementById('postReadTime').textContent = rtStr;
    document.getElementById('postMetaDot').style.display = dateStr ? 'inline' : 'none';

    var hero = document.getElementById('postHero');
    var heroWrap = document.getElementById('postHeroWrap');
    if (activePost.coverImage) {
      hero.src = activePost.coverImage;
      hero.alt = activePost.title;
      hero.style.display = 'block';
      heroWrap.classList.remove('no-image');
    } else {
      hero.style.display = 'none';
      heroWrap.classList.add('no-image');
    }

    renderPostBody();
    renderRelated();
    trackBlogView(activePost.id);
    loadViewCount(activePost.id);
    loadComments(activePost.id);

    document.getElementById('postView').classList.add('show');
    document.getElementById('postView').scrollTop = 0;
    document.body.style.overflow = 'hidden';

    loadInfolinksAd();

    pushPostState(activePost);
    injectJsonLd(activePost);
    initReveal();
    startProgress();
  }

  /* ── Infolinks ad (post view only, loaded once) ── */
  var infolinksLoaded = false;
  function loadInfolinksAd() {
    if (infolinksLoaded) return;
    infolinksLoaded = true;
    window.infolinks_pid = 3446473;
    window.infolinks_wsid = 0;
    var s = document.createElement('script');
    s.type = 'text/javascript';
    s.src = 'https://resources.infolinks.com/js/infolinks_main.js';
    document.getElementById('postAdSlot').appendChild(s);
  }


  /* ── Reading progress bar ── */
  var _progressListener = null;
  function startProgress() {
    var fill = document.getElementById('readProgressFill');
    var view = document.getElementById('postView');
    if (_progressListener) view.removeEventListener('scroll', _progressListener);
    fill.style.width = '0%';
    _progressListener = function() {
      var scrollTop = view.scrollTop;
      var total = view.scrollHeight - view.clientHeight;
      var pct = total > 0 ? Math.min(100, (scrollTop / total) * 100) : 0;
      fill.style.width = pct + '%';
    };
    view.addEventListener('scroll', _progressListener, { passive: true });
  }
  function stopProgress() {
    var fill = document.getElementById('readProgressFill');
    var view = document.getElementById('postView');
    if (_progressListener) { view.removeEventListener('scroll', _progressListener); _progressListener = null; }
    fill.style.width = '0%';
  }

  /* ── JSON-LD structured data ── */
  function injectJsonLd(post) {
    removeJsonLd();
    if (!post) return;
    var script = document.createElement('script');
    script.type = 'application/ld+json';
    script.id = 'post-jsonld';
    var datePublished = post.createdAt ? new Date(post.createdAt).toISOString() : '';
    var imageUrl = post.coverImage || '';
    var description = '';
    // Use first text block body as description
    (post.pages || []).some(function(pg) {
      if (pg.type === 'text' && pg.body) {
        description = pg.body.replace(/\s+/g, ' ').trim().slice(0, 160);
        return true;
      }
    });
    var data = {
      '@context': 'https://schema.org',
      '@type': 'BlogPosting',
      'headline': post.title || '',
      'description': description,
      'datePublished': datePublished,
      'dateModified': datePublished,
      'author': { '@type': 'Organization', 'name': 'Impact Grid Group', 'url': 'https://impactgridgroup.com' },
      'publisher': { '@type': 'Organization', 'name': 'Impact Grid Group', 'url': 'https://impactgridgroup.com' },
      'mainEntityOfPage': { '@type': 'WebPage', '@id': window.location.href },
      'articleSection': post.category || 'Journal'
    };
    if (imageUrl) data['image'] = imageUrl;
    script.textContent = JSON.stringify(data);
    document.head.appendChild(script);
  }
  function removeJsonLd() {
    var el = document.getElementById('post-jsonld');
    if (el) el.remove();
  }

  function _closePost(updateHistory) {
    document.getElementById('postView').classList.remove('show');
    document.body.style.overflow = '';
    stopProgress();
    removeJsonLd();
    activePost = null;
    activePostIdx = -1;
    if (updateHistory !== false) clearPostState();
  }

  function closePost() { _closePost(true); }

  document.getElementById('postCloseBtn').addEventListener('click', closePost);
  document.getElementById('postBackBtn').addEventListener('click', closePost);

  document.getElementById('commentForm').addEventListener('submit', function(e) {
    e.preventDefault();
    if (!activePost) return;
    var nameEl = document.getElementById('commentName');
    var bodyEl = document.getElementById('commentBody');
    var btn = document.getElementById('commentSubmitBtn');
    var status = document.getElementById('commentStatus');
    var name = nameEl.value.trim();
    var body = bodyEl.value.trim();
    if (!name || !body) return;
    btn.disabled = true;
    status.textContent = 'Posting…';
    (async function() {
      try {
        var sb = getContentClient();
        var { error } = await sb.from('blog_comments').insert({
          post_id: activePost.id, name: name, comment: body
        });
        if (error) throw error;
        nameEl.value = '';
        bodyEl.value = '';
        status.textContent = '';
        loadComments(activePost.id);
      } catch (err) {
        console.warn('Comment submit failed:', err);
        status.textContent = 'Something went wrong — please try again.';
      } finally {
        btn.disabled = false;
      }
    })();
  });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') {
      if (document.getElementById('lightbox').classList.contains('show')) {
        closeLightbox();
      } else if (activePost) {
        closePost();
      }
    }
  });

  /* ── Share / copy-link button ── */
  document.getElementById('shareBtn').addEventListener('click', function() {
    var url = window.location.href;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(function() { showCopied(); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showCopied();
    }
  });

  function showCopied() {
    var btn = document.getElementById('shareBtn');
    var lbl = document.getElementById('shareBtnLabel');
    btn.classList.add('copied');
    lbl.textContent = 'Link copied!';
    setTimeout(function() {
      btn.classList.remove('copied');
      lbl.textContent = 'Copy link';
    }, 2200);
  }

  /* ── Block HTML ── */
  function blockHTML(pg, isFirst) {
    if (pg.type === 'image') {
      return '<div class="post-block post-block-image reveal">' +
        '<img src="' + esc(pg.url) + '" alt="' + esc(pg.caption || '') + '" onclick="openLightbox(this.src)">' +
        (pg.caption ? '<div class="pb-caption">' + esc(pg.caption) + '</div>' : '') +
        '</div>';
    }
    if (pg.type === 'youtube') {
      var vid = esc(extractYoutubeId(pg.videoId || ''));
      return '<div class="post-block post-block-youtube-wrap reveal">' +
        '<div class="post-block-youtube" data-vid="' + vid + '">' +
          '<img class="pby-thumb" data-tier="0" src="https://img.youtube.com/vi/' + vid + '/hqdefault.jpg" alt="" onclick="playYoutube(this)" onerror="ytThumbError(this,\'' + vid + '\')">' +
          '<div class="pby-play" onclick="this.previousElementSibling.click()">▶</div>' +
        '</div>' +
        (pg.caption ? '<div class="pb-caption">' + esc(pg.caption) + '</div>' : '') +
        '</div>';
    }
    // text
    var firstClass = isFirst ? ' first-text' : '';
    return '<div class="post-block post-block-text' + firstClass + ' reveal">' +
      (pg.heading ? '<div class="pb-heading">' + esc(pg.heading) + '</div>' : '') +
      '<div class="pb-body">' + esc(pg.body || '') + '</div>' +
      '</div>';
  }

  function renderPostBody() {
    var body = document.getElementById('postBody');
    var pages = activePost.pages;
    if (!pages.length) {
      body.innerHTML = '<div class="post-empty">No content yet.</div>';
      return;
    }
    var firstTextSeen = false;
    body.innerHTML = pages.map(function(pg) {
      var isFirst = false;
      if (pg.type === 'text' && !firstTextSeen) { isFirst = true; firstTextSeen = true; }
      return blockHTML(pg, isFirst);
    }).join('');
  }

  /* ── Related posts ── */
  function renderRelated() {
    var section = document.getElementById('relatedSection');
    var grid = document.getElementById('relatedGrid');
    var related = posts.filter(function(p, i) {
      return i !== activePostIdx && (p.category || 'Journal') === (activePost.category || 'Journal');
    }).slice(0, 3);
    // fallback: pick any other posts if not enough
    if (related.length < 2) {
      related = posts.filter(function(p, i) { return i !== activePostIdx; }).slice(0, 3);
    }
    if (!related.length) { section.style.display = 'none'; return; }
    section.style.display = '';
    grid.innerHTML = related.map(function(p) {
      var idx = posts.indexOf(p);
      return '<div class="related-card" onclick="openPost(' + idx + ')">' +
        (p.coverImage ? '<img class="related-card-img" src="' + esc(p.coverImage) + '" alt="">' :
          '<div class="related-card-img"></div>') +
        '<div class="related-card-info">' +
          '<div class="related-card-tag">' + esc(p.category || 'Journal') + '</div>' +
          '<div class="related-card-title">' + esc(p.title) + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  /* ── Scroll-reveal ── */
  var revealObserver;
  function initReveal() {
    if (!window.IntersectionObserver) return;
    if (revealObserver) revealObserver.disconnect();
    revealObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) {
          e.target.classList.add('in-view');
          revealObserver.unobserve(e.target);
        }
      });
    }, { threshold: 0.08 });
    document.getElementById('postView').querySelectorAll('.reveal').forEach(function(el) {
      revealObserver.observe(el);
    });
  }

  /* ── Lightbox ── */
  function openLightbox(src) {
    var lb = document.getElementById('lightbox');
    document.getElementById('lightboxImg').src = src;
    lb.classList.add('show');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('show');
  }
  document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });
  // Hero image lightbox — click anywhere on the hero wrap opens lightbox
  document.getElementById('postHeroWrap').addEventListener('click', function(e) {
    var hero = document.getElementById('postHero');
    if (hero.src && hero.style.display !== 'none' && !document.getElementById('postHeroWrap').classList.contains('no-image')) {
      openLightbox(hero.src);
    }
  });

  /* ── YouTube ── */
  function playYoutube(imgEl) {
    var wrap = imgEl.parentElement;
    var vid = wrap.getAttribute('data-vid');
    wrap.innerHTML = '<iframe src="https://www.youtube-nocookie.com/embed/' + vid + '?autoplay=1" ' +
      'allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>';
  }

  /* ── Load from Supabase ── */
  async function loadPosts() {
    try {
      var sb = getContentClient();
      var { data: postsData, error: postsErr } = await sb
        .from('blog_posts')
        .select('*')
        .order('created_at', { ascending: false });
      if (postsErr) throw postsErr;

      var loaded = [];
      for (var i = 0; i < (postsData || []).length; i++) {
        var p = postsData[i];
        var { data: pagesData, error: pagesErr } = await sb
          .from('blog_pages')
          .select('*')
          .eq('post_id', p.id)
          .order('order', { ascending: true });
        if (pagesErr) throw pagesErr;
        loaded.push({
          id: p.id,
          title: p.title || 'Untitled',
          coverImage: p.cover_image || '',
          category: p.category || '',
          createdAt: p.created_at || '',
          pages: (pagesData || []).map(function(pg) {
            return {
              id: pg.id, order: pg.order, type: pg.type,
              heading: pg.heading || '', body: pg.body || '',
              url: pg.url || '', cloudinaryId: pg.cloudinary_id || '',
              videoId: pg.video_id || '', caption: pg.caption || ''
            };
          })
        });
      }
      posts = loaded;
    } catch (e) {
      console.warn('Blog fetch failed:', e);
      posts = [];
    }
    renderShelf();
    checkUrlPost();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadPosts);
  } else {
    loadPosts();
  }
  </script>

</body>
