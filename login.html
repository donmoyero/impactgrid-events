<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — ImpactGrid</title>
<meta name="description" content="Sign in to your ImpactGrid Creator Studio."/>
<link rel="icon" href="favicon.ico"/>
<link rel="manifest" href="manifest.json"/>
<link rel="stylesheet" href="shared.css"/>
<style>
/* login.html — page-specific styles only. Tokens/reset/nav/fonts → shared.css + nav.js */

/* ── background glow ── */
.login-bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 55% 55% at 20% 30%, rgba(201,126,8,.07), transparent),
    radial-gradient(ellipse 40% 40% at 80% 70%, rgba(45,110,219,.04), transparent);}
[data-theme="dark"] .login-bg{
  background:
    radial-gradient(ellipse 55% 55% at 20% 30%, rgba(240,180,41,.07), transparent),
    radial-gradient(ellipse 40% 40% at 80% 70%, rgba(79,142,247,.04), transparent);}

/* ── page layout ── */
.page{min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:80px 20px 40px;position:relative;z-index:1;}

/* ── card ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:44px 40px;width:100%;max-width:420px;
  box-shadow:0 20px 60px rgba(0,0,0,.07);
  animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both;}
[data-theme="dark"] .card{box-shadow:0 20px 60px rgba(0,0,0,.5);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}

/* card header */
.card-logo{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:24px;}
.card-logo-img{width:28px;height:28px;object-fit:contain;border-radius:6px;}
.card-logo-mark{width:28px;height:28px;border-radius:8px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:none;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:#fff;}
[data-theme="dark"] .card-logo-mark{color:#07090f;}
.card-logo-name{font-family:var(--fd);font-weight:900;font-size:16px;letter-spacing:-.03em;}
.card h1{font-family:var(--fd);font-size:24px;font-weight:900;
  letter-spacing:-.03em;text-align:center;margin-bottom:6px;}
.card-sub{font-size:14px;color:var(--text2);text-align:center;margin-bottom:28px;line-height:1.6;}

/* alert */
.alert{font-size:13px;padding:11px 14px;border-radius:9px;margin-bottom:16px;
  display:none;line-height:1.55;}
.alert.show{display:block;}
.alert-error{background:var(--red-dim);color:var(--red);border:1px solid rgba(217,79,59,.15);}
[data-theme="dark"] .alert-error{color:#f75f4f;}
.alert-success{background:var(--green-dim);color:var(--green);border:1px solid rgba(15,168,118,.2);}
[data-theme="dark"] .alert-success{color:#2dd4a0;}

/* Google button */
.btn-google{width:100%;padding:11px 14px;border-radius:9px;
  background:var(--bg);border:1px solid var(--border2);
  color:var(--text);font-size:13px;font-weight:600;font-family:var(--fb);
  display:flex;align-items:center;justify-content:center;gap:10px;
  cursor:pointer;transition:all .2s;margin-bottom:16px;}
.btn-google:hover{border-color:var(--gold);background:var(--bg2);}
.btn-google svg{flex-shrink:0;}

/* or divider */
.or-divider{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.or-divider span{font-size:11px;color:var(--text3);white-space:nowrap;font-family:var(--fm);}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:var(--border2);}

/* form */
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);
  margin-bottom:6px;font-family:var(--fm);letter-spacing:.04em;text-transform:uppercase;}
.input-wrap{position:relative;}
.form-input{width:100%;padding:11px 14px;border-radius:9px;
  border:1px solid var(--border2);background:var(--bg);
  color:var(--text);font-size:14px;font-family:var(--fb);
  outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--gold);}
.form-input::placeholder{color:var(--text3);}
.form-input.pw{padding-right:46px;}

/* eye toggle */
.pass-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;padding:4px;
  color:var(--text3);font-size:16px;line-height:1;transition:color .2s;
  display:flex;align-items:center;justify-content:center;}
.pass-eye:hover{color:var(--text2);}

.forgot{text-align:right;margin-top:-6px;margin-bottom:18px;}
.forgot a{font-size:12px;font-weight:600;color:var(--gold);transition:opacity .2s;}
.forgot a:hover{opacity:.75;}

/* submit button */
.btn-submit{width:100%;padding:13px;border-radius:10px;
  font-family:var(--fd);font-size:15px;font-weight:800;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#fff;border:none;cursor:pointer;
  transition:all .2s;margin-top:4px;letter-spacing:-.01em;}
[data-theme="dark"] .btn-submit{color:#07090f;}
.btn-submit:hover{transform:translateY(-2px);box-shadow:0 8px 28px var(--gold-glo);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}

/* loading dots */
.dots{display:inline-flex;gap:4px;align-items:center;margin-left:6px;vertical-align:middle;}
.dot{width:4px;height:4px;border-radius:50%;background:currentColor;
  opacity:.4;animation:dp 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.3;}40%{opacity:1;}}

/* bottom divider */
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;
  font-family:var(--fm);font-size:10px;color:var(--text3);
  text-transform:uppercase;letter-spacing:.12em;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* footer links */
.card-footer{text-align:center;font-size:13px;color:var(--text2);margin-top:18px;}
.card-footer a{color:var(--gold);font-weight:700;}
.card-footer a:hover{text-decoration:underline;}

/* trust strip */
.trust{display:flex;align-items:center;justify-content:center;gap:16px;
  margin-top:20px;padding-top:18px;border-top:1px solid var(--border);}
.trust-item{display:flex;align-items:center;gap:5px;
  font-family:var(--fm);font-size:10px;color:var(--text3);letter-spacing:.04em;}
.trust-icon{font-size:12px;}

@media(max-width:480px){
  .card{padding:32px 22px;border-radius:16px;}
  .nav-link{display:none;}
}
</style>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KVJC5DE2WT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-KVJC5DE2WT');
  </script>
</head>
<body>

<!-- Scripts: SDK → credentials → auth → nav (required load order) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script src="nav.js"></script>

<div class="login-bg"></div>

<!-- Shared Nav (renderNav called after nav.js loads) -->
<div id="ig-nav"></div>
<script>renderNav('login.html');</script>

<!-- page -->
<div class="page">
  <div class="card">

    <!-- logo -->
    <div class="card-logo">
      <img src="logo.png" class="card-logo-img" alt="ImpactGrid"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div class="card-logo-mark">IG</div>
      <span class="card-logo-name">ImpactGrid</span>
    </div>

    <h1>Welcome back</h1>
    <p class="card-sub">Sign in to your Creator Studio.</p>

    <div class="alert" id="alertBox"></div>

    <!-- Google sign-in -->
    <button class="btn-google" onclick="googleSignIn()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
        <path d="M3.964 10.707C3.784 10.167 3.682 9.59 3.682 9c0-.59.102-1.167.282-1.707V4.961H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="or-divider"><span>or sign in with email</span></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input id="email" class="form-input" type="email"
        placeholder="you@example.com" autocomplete="email"
        onkeydown="if(event.key==='Enter')login()"/>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <input id="password" class="form-input pw" type="password"
          placeholder="Your password" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')login()"/>
        <button type="button" class="pass-eye" id="eyeBtn" onclick="togglePw()" aria-label="Show password">👁</button>
      </div>
    </div>

    <div class="forgot"><a href="reset-password.html">Forgot password?</a></div>

    <button class="btn-submit" id="loginBtn" onclick="login()">Sign In →</button>

    <div class="card-footer" style="margin-top:20px;">
      Don't have an account? <a href="join.html">Join free</a>
    </div>

    <div class="trust">
      <div class="trust-item"><span class="trust-icon">🔒</span>Secure login</div>
      <div class="trust-item"><span class="trust-icon">✦</span>No card required</div>
      <div class="trust-item"><span class="trust-icon">⚡</span>Instant access</div>
    </div>

  </div>
</div>

<script>

/* Theme handled by nav.js — do not redeclare here */

/* ── Password eye toggle ── */
function togglePw() {
  var inp = document.getElementById('password');
  var btn = document.getElementById('eyeBtn');
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.textContent = '🙈';
  } else {
    inp.type = 'password';
    btn.textContent = '👁';
  }
}

/* ── Alert ── */
function showAlert(msg, type) {
  var el = document.getElementById('alertBox');
  el.innerHTML = msg;
  el.className = 'alert alert-' + type + ' show';
}

/* ── Redirect after login ── */
function redirectByRole(user, role) {
  if (role === 'admin' || (user.email && user.email === 'admin@impactgridgroup.com')) {
    window.location.href = 'admin.html';
  } else if (role === 'photographer') {
    window.location.href = 'dashboard.html';
  } else if (role === 'employer') {
    window.location.href = 'employer-dashboard.html';
  } else {
    window.location.href = 'creator-studio.html';
  }
}

/* ── Handle Google OAuth redirect back to this page ──
   ✅ FIX: getSession() is called AFTER the client is ready.
   Profile fetch for role is fully wrapped in try/catch so
   a 403 (RLS not set up yet) never blocks the redirect —
   user is already authenticated, default to 'creator'. ── */
(function() {
  var client = (typeof getSupabase === 'function') ? getSupabase() : null;
  if (!client) return;

  client.auth.getSession().then(function(res) {
    if (res.data && res.data.session) {
      var user = res.data.session.user;

      /* Only redirect if this is an OAuth callback (hash in URL) OR
         if the user has an active session and didn't just come here to log in.
         We check for hash to avoid redirecting email/password users who
         landed on login.html directly while already logged in. */
      var isOAuthCallback = window.location.hash && window.location.hash.length > 1;
      var isAlreadyLoggedIn = !isOAuthCallback && !window.location.search.includes('logout');

      if (isOAuthCallback || isAlreadyLoggedIn) {
        /* ✅ Profile fetch for role — safe try/catch, never blocks redirect */
        client.from('profiles')
          .select('role')
          .eq('user_id', user.id)
          .single()
          .then(function(profRes) {
            var role = (profRes.data && profRes.data.role) || 'creator';
            redirectByRole(user, role);
          })
          .catch(function() {
            /* Profile unavailable (403/RLS/missing row) — still redirect safely */
            redirectByRole(user, 'creator');
          });
      }
    }
  }).catch(function() {});
})();

/* ── Google Sign-In ── */
async function googleSignIn() {
  try {
    var c = getSupabase();
    if (!c) { showAlert('Auth service not ready — please refresh.', 'error'); return; }
    var res = await c.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/creator-studio.html' }
    });
    if (res.error) { console.error('[ImpactGrid] Google sign-in error:', res.error); throw res.error; }
  } catch(err) {
    console.error('[ImpactGrid] googleSignIn caught:', err);
    showAlert('Google sign-in failed: ' + (err.message || 'Please try again.'), 'error');
  }
}

/* ── Email / Password Login ── */
async function login() {
  var btn      = document.getElementById('loginBtn');
  var email    = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;

  if (!email || !password) {
    showAlert('Please enter your email and password.', 'error'); return;
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showAlert('Please enter a valid email address.', 'error'); return;
  }

  btn.disabled = true;
  btn.innerHTML = 'Signing in <span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>';

  try {
    var client = getSupabase();
    if (!client) {
      showAlert('Auth service not ready — please refresh.', 'error');
      btn.disabled = false; btn.innerHTML = 'Sign In →'; return;
    }

    var res = await client.auth.signInWithPassword({ email: email, password: password });
    if (res.error) { console.error('[ImpactGrid] signInWithPassword error:', res.error); throw res.error; }

    /* ✅ FIX: Profile fetch uses user_id column (not id) to match schema.
       Wrapped in try/catch — a 403 or missing row never blocks login.
       User is already authenticated at this point; just default to 'creator'. */
    var role = 'creator';
    try {
      var profRes = await client.from('profiles').select('role').eq('user_id', res.data.user.id).single();
      if (profRes.data && profRes.data.role) role = profRes.data.role;
    } catch(profErr) {
      console.warn('[ImpactGrid] Profile fetch skipped — defaulting to creator role:', profErr.message || profErr);
    }

    redirectByRole(res.data.user, role);

  } catch(e) {
    console.error('[ImpactGrid] login() caught:', e);
    var msg = e.message || 'Login failed. Please check your details.';
    if (msg.toLowerCase().includes('invalid login') || msg.toLowerCase().includes('invalid credentials')) {
      msg = 'Incorrect email or password. Please try again.';
    }
    if (msg.toLowerCase().includes('email not confirmed')) {
      msg = 'Please check your email and click the confirmation link before signing in.';
    }
    showAlert(msg, 'error');
    btn.disabled = false;
    btn.innerHTML = 'Sign In →';
  }
}

</script>
</body>
</html>
